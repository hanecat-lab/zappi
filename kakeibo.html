      <button onClick={open} style={{ display:"flex", alignItems:"center", gap:4, border:"1px solid #C5D5EE", borderRadius:8, background:"#fff", padding:"4px 10px", cursor:"pointer", height:28, fontSize:12, fontWeight:700, color:"#1A2840", whiteSpace:"nowrap" }}>
        🗓 {monthNum}月{day}日
      </button>
      <input ref={ref} type="date" value={val}
        min={`${year}-${pad(monthNum)}-01`}
        max={`${year}-${pad(monthNum)}-${pad(maxDay)}`}
        onChange={e=>{ const d=e.target.value.split('-')[2]; if(d) onChange(Number(d)); }}
        style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }}
      />
    </div>
  );
}

  useEffect(() => {
    if (!current.varItems) {
      const keitai   = Number(current.keitai)   || 0;
      const merukari = Number(current.merukari) || 0;

        if (v.name === "携帯(UQ)") return { ...v, amount: keitai };
        if (v.name === "メルカリ") return { ...v, amount: merukari };
        if (v.name === "Paidy")    return { ...v, amount: paidy };
        return v;
      });
      setCurrent(c => ({ ...c, varItems: migrated }));
    }
  }, []);

  useEffect(() => lsSet(SK.fixed,      fixed),     [fixed]);
  useEffect(() => lsSet(SK.history,    history),   [history]);
  useEffect(() => lsSet(SK.current,    current),   [current]);
  useEffect(() => lsSet(SK.occMaster,  occMaster), [occMaster]);
  useEffect(() => lsSet(SK.expCats,    expCats),   [expCats]);
  useEffect(() => lsSet(SK.bonusHist,  bonusHist), [bonusHist]);
  useEffect(() => lsSet(SK.salary,     salaryHist), [salaryHist]);
  useEffect(() => lsSet(SK.allowances, allowances), [allowances]);
  useEffect(() => lsSet(SK.hideNums,      hideNums),      [hideNums]);
  useEffect(() => lsSet(SK.hideExpNums,   hideExpNums),   [hideExpNums]);
  useEffect(() => lsSet(SK.plannedEvents, plannedEvents), [plannedEvents]);
  useEffect(() => lsSet(SK.includePlanned, includePlanned), [includePlanned]);
  useEffect(() => lsSet(SK.fuelRecords,   fuelRecords),   [fuelRecords]);

  const varItems      = current.varItems  || DEFAULT_VAR_ITEMS;
  const expenses      = current.expenses  || [];
  const fixedTotal    = useMemo(() => fixed.reduce((s,f) => s + f.amount, 0), [fixed]);
  const varTotal      = varItems.reduce((s,v) => s + (Number(v.amount)||0), 0);
  const cashExpTotal  = expenses.filter(e => e.type === "cash").reduce((s,e) => s + (Number(e.amount)||0), 0);
  const creditExpTotal= expenses.filter(e => e.type === "credit").reduce((s,e) => s + (Number(e.amount)||0), 0);
  const monthNum      = Number((current.month.match(/(\d+)月/) || [])[1] || 0);
  const isOddMonth    = monthNum % 2 !== 0;
  const nhkVal        = isOddMonth ? 3900 : 0;
  const bonusItems    = current.bonusItems || [];
  const bonusItemsTotal = bonusItems.reduce((s,i) => s + (Number(i.amount)||0), 0);
  const bonusBal      = (Number(current.bonusIncome)||0) - bonusItemsTotal;
  const occTotal      = (current.occasionals||[]).reduce((s,o) => s + (Number(o.amount)||0), 0);
  const plannedTotal  = plannedEvents.reduce((s,e) => s + (Number(e.amount)||0), 0);
  const totalOut      = fixedTotal + varTotal + nhkVal + occTotal + cashExpTotal;
  const income        = Number(current.income) || 0;
  const balance       = income - totalOut;
  const displayBalance = balance - (includePlanned ? plannedTotal : 0);
  const balColor      = balance < 0 ? "#C84040" : balance < 20000 ? "#D4901A" : "#2A7A5A";

  function closeMonth() {
    const rec = {
      month: current.month, income, totalOut, balance,
      fixed: fixedTotal, nhk: nhkVal, varItems,
      occasionals: current.occasionals || [],
      cashExpTotal, creditExpTotal,
      expenses,
      closedAt: new Date().toISOString(),
    };
    setHistory(prev => [rec, ...prev]);
    const next = new Date();
    next.setMonth(next.getMonth() + 1);
    const nextVarItems = varItems.map(v => ({ ...v, amount: 0 }));
    setCurrent({ ...DEFAULT_CURRENT, month: `${next.getFullYear()}年${next.getMonth()+1}月`, varItems: nextVarItems, bonusIncome: 0, bonusItems: [] });
    setShowClose(false);
  }

  function updateFixed(id, field, val) {
    setFixed(prev => prev.map(f => f.id === id ? {...f, [field]: field==="amount" ? Number(val)||0 : val} : f));
  }

  function updateVarAmount(id, val) {
    setCurrent(c => ({...c, varItems: (c.varItems||[]).map(v => v.id === id ? {...v, amount: Number(val)||0} : v)}));
  }

  function saveVarName(id) {
    if (!editVarName.trim()) return;
    setCurrent(c => ({...c, varItems: (c.varItems||[]).map(v => v.id === id ? {...v, name: editVarName.trim()} : v)}));
    setEditVarId(null);
  }

  function deleteVarItem(id) {
    setCurrent(c => ({...c, varItems: (c.varItems||[]).filter(v => v.id !== id)}));
    setEditVarId(null);
  }

  function addVarItem() {
    if (!newVarName.trim()) return;
    const item = { id: Date.now(), name: newVarName.trim(), amount: 0 };
    setCurrent(c => ({...c, varItems: [...(c.varItems||[]), item]}));
    setNewVarName("");
    setShowAddVar(false);
  }

  function addExpense() {
    if (!newExp.name || !newExp.amount) return;
    const item = { id: Date.now(), date: newExp.date, name: newExp.name, amount: Number(newExp.amount)||0, type: newExp.type, catId: newExp.catId };
    setCurrent(c => ({...c, expenses: [...(c.expenses||[]), item]}));
    setNewExp({ date: todayStr(), name:"", amount:"", type: newExp.type, catId: newExp.catId });
    setShowAddExp(false);
  }

  function saveCatName(id) {
    if (!editCatName.trim()) return;
    setExpCats(prev => prev.map(c => c.id === id ? {...c, name: editCatName.trim()} : c));
    setEditCatId(null);
  }

  function addCat() {
    if (!newCatName.trim()) return;
    setExpCats(prev => [...prev, { id: Date.now(), name: newCatName.trim() }]);
    setNewCatName("");
    setShowAddCat(false);
  }

  function deleteExpense(id) {
    setCurrent(c => ({...c, expenses: (c.expenses||[]).filter(e => e.id !== id)}));
  }
  function toggleExpenseType(id) {
    setCurrent(c => ({...c, expenses: (c.expenses||[]).map(e => e.id===id ? {...e, type:e.type==="cash"?"credit":"cash"} : e)}));
  }

  function addOccasional() {
    if (!occInput.name || !occInput.amount) return;
    const item = { id: Date.now(), name: occInput.name, amount: Number(occInput.amount)||0 };
    setCurrent(c => ({...c, occasionals: [...(c.occasionals||[]), item]}));
    setOccInput({ name:"", amount:"" });
    setShowOcc(false);
  }

  function addToThisMonth(master) {
    const item = { id: Date.now(), name: master.name, amount: master.amount };
    setCurrent(c => ({...c, occasionals: [...(c.occasionals||[]), item]}));
  }

  function updateOccMaster(id, field, val) {
    setOccMaster(prev => prev.map(o => o.id === id ? {...o, [field]: field==="amount" ? Number(val)||0 : val} : o));
  }

  function addOccMaster() {
    if (!newOcc.name) return;
    const item = { id: Date.now(), name: newOcc.name, amount: Number(newOcc.amount)||0, note: newOcc.note };
    setOccMaster(prev => [...prev, item]);
    setNewOcc({ name:"", amount:"", note:"" });
    setShowAddOcc(false);
  }

  function exportData() {
    const data = {
      [SK.fixed]:      fixed,
      [SK.history]:    history,
      [SK.current]:    current,
      [SK.occMaster]:  occMaster,
      [SK.expCats]:    expCats,
      [SK.bonusHist]:  bonusHist,
      [SK.salary]:     salaryHist,
      [SK.allowances]: allowances,
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `kakeibo_${current.month.replace("年","-").replace("月","")}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setShowData(false);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data[SK.fixed])      setFixed(data[SK.fixed]);
        if (data[SK.history])    setHistory(data[SK.history]);
        if (data[SK.current])    setCurrent(data[SK.current]);
        if (data[SK.occMaster])  setOccMaster(data[SK.occMaster]);
        if (data[SK.expCats])    setExpCats(data[SK.expCats]);
        if (data[SK.bonusHist])  setBonusHist(data[SK.bonusHist]);
        if (data[SK.salary])     setSalaryHist(data[SK.salary]);
        if (data[SK.allowances]) setAllowances(data[SK.allowances]);
        setShowData(false);
      } catch {
        alert("読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

    const data = { [SK.fuelRecords]: fuelRecords, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fuel_records_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setShowFuelData(false);
  }

    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const records = data[SK.fuelRecords] ?? (Array.isArray(data) ? data : null);

                <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:80 }}>
                  {[...history].reverse().slice(-6).map((h,i) => {
                    const pct = Math.abs(h.balance)/maxBal;
                    const isNeg = h.balance < 0;
                    return (
                      <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                        <div style={{ fontSize:9, color:isNeg?"#C84040":"#3060B0", fontWeight:600 }}>{hideNums?"-":(isNeg?"-":"+")+Math.abs(Math.round(h.balance/1000))+"k"}</div>
                        <div style={{ width:"100%", borderRadius:4, height:Math.max(pct*60,4), background:isNeg?"#E8A0A0":"#6090E0" }} />
                        <div style={{ fontSize:9, color:"#88A8CC" }}>{h.month.replace(/\d{4}年/,"").replace("月","")}月</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {history.map((h,i) => (
                  <div key={i} style={{ ...card }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
                      <span style={{ fontSize:16, fontWeight:700 }}>{h.month}</span>
                      <span style={{ fontSize:18, fontWeight:700, color:h.balance<0?"#C84040":"#2A7A5A" }}>{maskY(yen(h.balance))}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#5070A0" }}>
                      <span>手取 {maskY(yen(h.income))}</span>
                      <span>支出 {maskY(yen(h.totalOut))}</span>
                    </div>
                    {h.cashExpTotal > 0 && <div style={{ marginTop:4, fontSize:11, color:"#88A8CC" }}>現金支出 {maskY(yen(h.cashExpTotal))} / CR {maskY(yen(h.creditExpTotal||0))}</div>}
                    {h.occasionals && h.occasionals.length > 0 && (
                      <div style={{ marginTop:4, fontSize:11, color:"#88A8CC" }}>臨時: {h.occasionals.map(o=>o.name).join("・")}</div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ===== 賞与管理 =====
  if (page === "bonus") {
    const bonusInc = Number(current.bonusIncome) || 0;

    function saveBonusToHistory() {
      const entry = {
        id: Date.now(),
        year: Number(saveBonusYear),
        bonusMonth: Number(saveBonusMonth),
        income: bonusInc,
        items: [...bonusItems],
        balance: bonusBal,
        memo: saveBonusMemo.trim(),
        recordedAt: new Date().toISOString(),
      };
      setBonusHist(prev => {
        const filtered = prev.filter(e => !(e.year === entry.year && e.bonusMonth === entry.bonusMonth));
        return [entry, ...filtered].sort((a, b) => b.year - a.year || b.bonusMonth - a.bonusMonth);
      });
      setCurrent(c => ({...c, bonusIncome: 0, bonusItems: [], bonusMemo: ""}));
      setSaveBonusMemo("");
      setShowSaveBonus(false);
    }

    function addPastBonusHist() {
      if (!newBonusHist.income) return;
      const inc = Number(newBonusHist.income) || 0;
      const entry = {
        id: Date.now(),
        year: Number(newBonusHist.year),
        bonusMonth: Number(newBonusHist.bonusMonth),
        income: inc,
        items: [],
        balance: inc,
        memo: (newBonusHist.memo || "").trim(),
        recordedAt: new Date().toISOString(),
      };
      setBonusHist(prev => {
        const filtered = prev.filter(e => !(e.year === entry.year && e.bonusMonth === entry.bonusMonth));
        return [entry, ...filtered].sort((a, b) => b.year - a.year || b.bonusMonth - a.bonusMonth);
      });
      setNewBonusHist({ year: new Date().getFullYear(), bonusMonth: 6, income: "", memo: "" });
      setShowAddBonusHist(false);

      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:40 }}>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
              <div style={{ fontSize:11, color:"#90B8F0" }}>賞与残り（今回分）</div>

              <span>使途合計 {maskY(yen(bonusItemsTotal))}</span>

              <div style={{ marginTop:10, background:"rgba(0,0,0,0.25)", borderRadius:4, height:5, overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:4, transition:"width 0.4s ease",
                  width:`${Math.min((bonusItemsTotal/bonusInc)*100,100)}%`,
                  background: bonusItemsTotal/bonusInc > 0.9 ? "#C84040" : bonusItemsTotal/bonusInc > 0.7 ? "#D4901A" : "#60A8F0"

              </div>
            )}
          </div>

          <div style={{ ...card, marginBottom:12 }}>

                      setNewBonusName(""); setNewBonusAmount(""); setShowAddBonus(false);

                <button onClick={()=>setShowAddBonus(true)} style={{ marginTop:bonusItems.length>0?8:0, padding:"11px", width:"100%", background:"transparent", border:"1.5px dashed #A8C0EC", borderRadius:8, color:"#3B6FCC", fontSize:13, cursor:"pointer", fontWeight:600 }}>＋ 使い道を追加</button>
              )}
            </div>
          </div>

          <div style={{ ...card, marginBottom:12 }}>
            <div style={{ fontSize:11, color:"#4A6090", letterSpacing:"0.1em", marginBottom:4 }}>メモ（今回分）</div>

          {(bonusInc > 0 || bonusItems.length > 0) && (
            <button onClick={()=>{

          {bonusHist.length > 0 && (() => {

                </div>
              </div>
              <div style={{ display:"flex",gap:10,marginTop:20 }}>
                <button onClick={()=>{setShowSaveBonus(false);setSaveBonusMemo("");}} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
                <button onClick={saveBonusToHistory} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>記録する</button>
              </div>
            </div>
          </div>
        )}

        {showAddBonusHist && (
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowAddBonusHist(false)}>
            <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>

  // ===== 臨時支出マスター =====
  if (page === "occasional") {

                    <input value={o.note} onChange={e=>updateOccMaster(o.id,"note",e.target.value)} style={{...inp,marginTop:0}} placeholder="発生時期・メモ" />

                      <button onClick={()=>{setOccMaster(p=>p.filter(x=>x.id!==o.id));setEditOcc(null);}} style={{ flex:1,padding:"10px",background:"#FEF0F0",border:"none",borderRadius:10,color:"#C84040",fontSize:13,cursor:"pointer" }}>削除</button>

                      {o.note&&<div style={{ fontSize:11,color:"#88A8CC",marginTop:2 }}>{o.note}</div>}
                    </div>
                    <div style={{ fontWeight:700,fontSize:14,color:"#1A2840" }}>{yen(o.amount)}</div>
                    <button onClick={()=>{addToThisMonth(o);setPage("home");}} style={{ background:"#EEF4FF",border:"1px solid #B0C4F0",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:11,color:"#3B6FCC",fontWeight:700,whiteSpace:"nowrap" }}>今月＋</button>
                    <button onClick={()=>setEditOcc(o.id)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14 }}>✏️</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          <button onClick={()=>setShowAddOcc(true)} style={{ marginTop:12,width:"100%",padding:"13px",background:"transparent",border:"2px dashed #A8C0EC",borderRadius:14,color:"#3B6FCC",fontSize:14,cursor:"pointer",fontWeight:600 }}>＋ 項目を追加</button>
        </div>
        {showAddOcc&&(
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowAddOcc(false)}>

                <div><label style={{ fontSize:11,color:"#4A6090" }}>金額</label><input type="number" value={newOcc.amount} onChange={e=>setNewOcc(o=>({...o,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" /></div>

  // ===== 出費管理 =====
  if (page === "expenses") {
    const sorted = [...expenses].reverse();
    const filtered = filterCat ? sorted.filter(e => e.catId === filterCat) : sorted;
    const catName = id => (expCats.find(c => c.id === id) || {name:"未分類"}).name;
    const catColor = id => {
      const idx = expCats.findIndex(c => c.id === id);
      return ["#3B70CC","#8050C8","#C04060","#2890A8","#A038B0","#2870C8","#8850C0","#4858A8"][idx] || "#5068A8";
    };
    const m2 = current.month.match(/(\d+)年(\d+)月/) || [];
    const expYear = Number(m2[1]) || new Date().getFullYear();
    const expMonthNum = Number(m2[2]) || (new Date().getMonth() + 1);
    const expMonthDays = new Date(expYear, expMonthNum, 0).getDate();
    const expDay = parseInt((newExp.date || "").split("/")[1]) || new Date().getDate();
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:100 }}>
        <SubHeader title="出費管理" sub="EXPENSES" rightAction={
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={()=>setHideExpNums(h=>!h)} style={{ background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.18)", borderRadius:6, padding:"2px 8px", fontSize:10, color:"#D8EEFF", cursor:"pointer", letterSpacing:"0.05em" }}>{hideExpNums?"表示":"隠す"}</button>
            <button onClick={()=>setShowData(true)} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:8, padding:"6px 10px", color:"#D8EEFF", fontSize:16, cursor:"pointer" }}>⚙️</button>
            <button onClick={()=>setPage("fuel")} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:8, padding:"6px 10px", color:"#D8EEFF", fontSize:16, cursor:"pointer" }}>🚗</button>
          </div>
        } />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>

          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <div style={{ flex:1, ...card, padding:"14px", textAlign:"center" }}>
              <div style={{ fontSize:11, color:"#4A6090", marginBottom:4 }}>現金支出</div>

              <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                <button onClick={exportData} style={{ padding:"15px",background:"#1C3561",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>

                </button>

            </div>
          </div>

  }

  // ===== 燃費記録 =====
  if (page === "fuel") {
    const today = new Date().toISOString().slice(0,10);
    const sorted = [...fuelRecords].sort((a,b) => a.odometer - b.odometer);
    const enriched = sorted.map((r, i) => {
      const prev = sorted[i-1];
      const dist = prev ? r.odometer - prev.odometer : null;
      const eff  = (dist != null && r.liters > 0) ? dist / r.liters : null;
      return { ...r, dist, eff };
    });
    const totalKm    = sorted.length >= 2 ? sorted[sorted.length-1].odometer - sorted[0].odometer : null;
    const totalLiter = sorted.slice(1).reduce((s,r) => s + r.liters, 0);
    const avgEff     = (totalKm && totalLiter > 0) ? totalKm / totalLiter : null;
    const lastOdo    = sorted.length > 0 ? sorted[sorted.length-1].odometer : null;
    const lastLiters = sorted.length > 0 ? sorted[sorted.length-1].liters : null;
    const avgLiters  = sorted.length >= 2 ? totalLiter / (sorted.length - 1) : null;
    const nextDistEst = (avgEff && avgLiters) ? Math.round(avgEff * avgLiters) : null;
    const nextOdoEst  = (lastOdo != null && nextDistEst) ? lastOdo + nextDistEst : null;
    const last4      = sorted.slice(-4);
    const last3Km    = last4.length >= 2 ? last4[last4.length-1].odometer - last4[0].odometer : null;
    const last3Liter = last4.slice(1).reduce((s,r) => s + r.liters, 0);
    const last3Eff   = (last3Km && last3Liter > 0) ? last3Km / last3Liter : null;

    const byMonth = {};
    enriched.forEach(r => {
      const k = r.date ? r.date.slice(0,7) : "";
      if (!k) return;
      if (!byMonth[k]) byMonth[k] = { amount:0, liters:0, dist:0 };
      byMonth[k].amount += r.amount || 0;
      byMonth[k].liters += r.liters || 0;
      byMonth[k].dist   += r.dist   || 0;
    });
    const monthList = Object.keys(byMonth).sort().map(k => ({ month:k, ...byMonth[k] }));

    const fmtDate = d => d ? d.replace(/-/g,"/") : "";
    const fmtL    = l => l != null ? l.toFixed(1) + "L" : "-";
    const fmtEff  = e => e != null ? e.toFixed(1) + " km/L" : "-";
    const fmtMo   = k => { const p=k.split("-"); return p[0]+"/"+Number(p[1])+"月"; };

    const calcFuel = (field, value, state) => {
      const next = { ...state, [field]: value };
      const l = Number(next.liters);
      const a = Number(next.amount);
      if ((field === "liters" || field === "amount") && Number(next.liters) > 0 && Number(next.amount) > 0)
        next.pricePerLiter = String(Math.round(Number(next.amount) / Number(next.liters)));
      else if (field === "pricePerLiter" && Number(value) > 0 && a > 0)
        next.liters = String(Math.round(a / Number(value) * 100) / 100);
      return next;
    };
    const getFuelL = f => {
      if (Number(f.liters) > 0) return Number(f.liters);
      if (Number(f.amount) > 0 && Number(f.pricePerLiter) > 0)
        return Math.round(Number(f.amount) / Number(f.pricePerLiter) * 100) / 100;
      return null;
    };

    const canSaveNew  = newFuel.odometer && Number(newFuel.odometer) > 0 && getFuelL(newFuel) != null;
    const canSaveEdit = editFuel != null && editFuel.odometer && Number(editFuel.odometer) > 0 && getFuelL(editFuel) != null;

    const saveFuel = () => {
      const liters = getFuelL(newFuel);
      const actualOdo = (odoMode === "diff" && lastOdo != null)
        ? lastOdo + Number(newFuel.odometer)
        : Number(newFuel.odometer);
      setFuelRecords(p => [...p, {
        id: Date.now(),
        date: newFuel.date || today,
        odometer: actualOdo,
        liters,
        amount: newFuel.amount ? Number(newFuel.amount) : null,
        pricePerLiter: newFuel.pricePerLiter ? Number(newFuel.pricePerLiter) : null,
      }]);
      if (newFuel.amount && Number(newFuel.amount) > 0) {
        const d = newFuel.date || today;
        const [, m, day] = d.split("-");
        const dateStr = Number(m) + "/" + Number(day);
        const fuelCatId = (expCats.find(c => c.name === "交通費") || expCats[0] || { id:4 }).id;
        setCurrent(c => ({...c, expenses: [...(c.expenses||[]), {
          id: Date.now() + 1,
          date: dateStr,
          name: "ガソリン",
          amount: Number(newFuel.amount),
          type: "cash",
          catId: fuelCatId,
        }]}));
      }
      setOpenMonths(null);
      setNewFuel({ date:"", odometer:"", liters:"", amount:"3000", pricePerLiter:"", _le:"amount" });
    };
    const startEdit = r => {
      setEditFuelId(r.id);
      setEditFuel({ date:r.date||today, odometer:String(r.odometer), liters:r.liters!=null?String(r.liters):"", amount:r.amount!=null?String(r.amount):"", pricePerLiter:r.pricePerLiter!=null?String(r.pricePerLiter):"", _le:"liters" });
    };
    const saveEdit = () => {
      if (!canSaveEdit) return;
      const liters = getFuelL(editFuel);
      setFuelRecords(p => p.map(r => r.id === editFuelId ? { ...r, date:editFuel.date, odometer:Number(editFuel.odometer), liters, amount:editFuel.amount?Number(editFuel.amount):null, pricePerLiter:editFuel.pricePerLiter?Number(editFuel.pricePerLiter):null } : r));
      setEditFuelId(null); setEditFuel(null);
    };

    const displayList = [...enriched].reverse();
    const inpSm = { ...inp, marginTop:0, fontSize:13, padding:"8px 10px" };

    const monthGroups = [];
    const monthMap = {};
    displayList.forEach(r => {
      const mk = r.date ? r.date.slice(0,7) : "unknown";
      if (!monthMap[mk]) { monthMap[mk] = []; monthGroups.push({ mk, records: monthMap[mk] }); }
      monthMap[mk].push(r);
    });
    const firstMk = monthGroups.length > 0 ? monthGroups[0].mk : null;
    const isOpen  = mk => openMonths === null ? mk === firstMk : openMonths.has(mk);
    const toggleMonth = mk => {
      const base = openMonths === null ? new Set([firstMk]) : new Set(openMonths);
      if (base.has(mk)) base.delete(mk); else base.add(mk);
      setOpenMonths(base);
    };

    return (
      <div style={{ minHeight:"100vh", background:"linear-gradient(180deg,#eef4ff,#f8fbff)", paddingBottom:80 }}>
        <SubHeader title="燃費記録" sub="FUEL" rightAction={
          <button onClick={()=>setShowFuelData(true)} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:8, padding:"6px 10px", color:"#D8EEFF", fontSize:16, cursor:"pointer" }}>⚙️</button>
        } />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>

          {sorted.length >= 2 && (
            <div style={{ display:"flex", gap:10, marginBottom:12 }}>
              <div style={{ flex:1, ...card, padding:"14px", textAlign:"center" }}>
                <div style={{ fontSize:10, color:"#4A6090", marginBottom:4, letterSpacing:"0.08em" }}>総合燃費</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#1A2840" }}>{fmtEff(avgEff)}</div>
                <div style={{ fontSize:10, color:"#88A8CC", marginTop:2 }}>累積（全期間）</div>
              </div>
              <div style={{ flex:1, ...card, padding:"14px", textAlign:"center" }}>
                <div style={{ fontSize:10, color:"#4A6090", marginBottom:4, letterSpacing:"0.08em" }}>直近 3 回</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#4f7cff" }}>{fmtEff(last3Eff)}</div>
                <div style={{ fontSize:10, color:"#88A8CC", marginTop:2 }}>{last4.length >= 2 ? `直近 ${last4.length-1} 区間` : "データ不足"}</div>
              </div>
            </div>
          )}

          {sorted.length >= 2 && (
            <div style={{ ...card, marginBottom:12, padding:"12px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#4A6090" }}>
                <span>総走行距離 <strong style={{ color:"#1A2840" }}>{totalKm != null ? totalKm.toLocaleString()+" km" : "-"}</strong></span>
                <span>総給油量 <strong style={{ color:"#1A2840" }}>{totalLiter > 0 ? totalLiter.toFixed(1)+" L" : "-"}</strong></span>
                <span>記録数 <strong style={{ color:"#1A2840" }}>{sorted.length} 件</strong></span>
              </div>
            </div>
          )}

          {nextOdoEst != null && (
            <div style={{ ...card, marginBottom:12, padding:"11px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:11, color:"#4A6090" }}>⛽ 次回給油目安</span>
              <span style={{ fontSize:13, fontWeight:700, color:"#2348b8" }}>
                あと約 {nextDistEst.toLocaleString()} km
                <span style={{ fontSize:11, fontWeight:400, color:"#88A8CC", marginLeft:6 }}>ODO ~{nextOdoEst.toLocaleString()}</span>
              </span>
            </div>
          )}

          <div style={{ marginBottom:16 }}>
            <div style={{ background:"#fff", border:"1px solid #c5d8ff", borderRadius:16, padding:"12px 16px", marginBottom: lastOdo != null ? 4 : 10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                <span style={{ fontSize:13 }}>📅</span>
                <input type="date" value={newFuel.date || today} onChange={e=>setNewFuel(f=>calcFuel("date",e.target.value,f))}
                  style={{ border:"none", background:"transparent", fontSize:12, color:"#88A8CC", outline:"none", fontWeight:500, fontFamily:"inherit" }} />
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:14 }}>🚗</span>
                <input type="number" value={newFuel.odometer} onChange={e=>setNewFuel(f=>calcFuel("odometer",e.target.value,f))} onFocus={e=>e.target.select()} placeholder=""
                  style={{ border:"none", background:"transparent", fontSize:24, color:"#1A2840", outline:"none", fontWeight:700, fontFamily:"inherit", flex:1, minWidth:0, textAlign:"center" }} inputMode="numeric" />
                <span style={{ fontSize:12, color:"#88A8CC", flexShrink:0 }}>km</span>
              </div>
              {odoMode==="diff" && lastOdo != null && newFuel.odometer && (
                <div style={{ textAlign:"center", fontSize:11, color:"#B0C4E0", marginTop:4 }}>
                  = {(lastOdo + Number(newFuel.odometer)).toLocaleString()} km
                </div>
              )}
              {lastOdo != null && (
                <div style={{ display:"flex", justifyContent:"center", marginTop:12 }}>
                  <div style={{ display:"flex", background:"#EEF4FF", borderRadius:20, padding:3 }}>
                    <button onClick={()=>setOdoMode("diff")} style={{
                      padding:"6px 20px", borderRadius:16, border:"none", cursor:"pointer", fontSize:12, fontWeight:700,
                      background: odoMode==="diff" ? "#2348b8" : "transparent",
                      color: odoMode==="diff" ? "#fff" : "#88A8CC"
                    }}>+km</button>
                    <button onClick={()=>setOdoMode("abs")} style={{
                      padding:"6px 20px", borderRadius:16, border:"none", cursor:"pointer", fontSize:12, fontWeight:700,
                      background: odoMode==="abs" ? "#2348b8" : "transparent",
                      color: odoMode==="abs" ? "#fff" : "#88A8CC"
                    }}>ODO</button>
                  </div>
                </div>
              )}
            </div>
            {lastOdo != null && (
              <div style={{ fontSize:11, color:"#B0C4E0", textAlign:"right", marginBottom:10, paddingRight:4 }}>前回 {lastOdo.toLocaleString()} km</div>
            )}

            <div style={{ background:"#fff", border:"1px solid #c5d8ff", borderRadius:16, overflow:"hidden", marginBottom:12 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", borderBottom:"1px solid #e8f0ff" }}>
                {["単価", "給油量", "金額"].map((label, i) => (
                  <div key={label} style={{ padding:"8px 14px", fontSize:11, color:"#4A6090", fontWeight:600,
                    borderRight: i < 2 ? "1px solid #e8f0ff" : "none" }}>
                    {label}
                    {label === "給油量" && lastLiters != null && (
                      <span style={{ fontSize:9, color:"#B0C4E0", marginLeft:4 }}>前回{lastLiters.toFixed(1)}L</span>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
                <input type="number" value={newFuel.pricePerLiter} onChange={e=>setNewFuel(f=>calcFuel("pricePerLiter",e.target.value,f))} onFocus={e=>e.target.select()} placeholder=""
                  style={{ padding:"12px 14px", border:"none", borderRight:"1px solid #e8f0ff", fontSize:18, fontWeight:700, color:"#1A2840", background:"transparent", outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"inherit", textAlign:"center" }} inputMode="decimal" />
                <input type="number" value={newFuel.liters} onChange={e=>setNewFuel(f=>calcFuel("liters",e.target.value,f))} onFocus={e=>e.target.select()} placeholder=""
                  style={{ padding:"12px 14px", border:"none", borderRight:"1px solid #e8f0ff", fontSize:18, fontWeight:700, color:"#4f7cff", background:"transparent", outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"inherit", textAlign:"center" }} inputMode="decimal" />
                <input type="number" value={newFuel.amount} onChange={e=>setNewFuel(f=>calcFuel("amount",e.target.value,f))} onFocus={e=>e.target.select()} placeholder="3000"
                  style={{ padding:"12px 14px", border:"none", fontSize:18, fontWeight:700, color:"#1A2840", background:"transparent", outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"inherit", textAlign:"center" }} inputMode="numeric" />
              </div>
            </div>

            <button onClick={saveFuel} disabled={!canSaveNew}
              style={{ width:"100%", padding:"15px", background:canSaveNew?"#2348b8":"#B0C0D8", border:"none", borderRadius:14, color:"#fff", fontSize:15, cursor:canSaveNew?"pointer":"not-allowed", fontWeight:700, letterSpacing:"0.04em" }}>
              保存
            </button>
          </div>

          {sorted.length === 0 && (
            <div style={{ ...card, marginBottom:12, padding:"24px 16px", textAlign:"center", color:"#88A8CC", fontSize:13 }}>
              <div style={{ fontSize:28, marginBottom:8 }}>⛽</div>
              給油記録がありません。上のフォームから最初の記録を追加してください。<br />
              <div style={{ fontSize:11, marginTop:8, color:"#B0C0D8" }}>※ 2件目以降から燃費が計算されます</div>
            </div>
          )}
          {sorted.length === 1 && (
            <div style={{ ...card, marginBottom:12, padding:"12px 16px", fontSize:12, color:"#88A8CC", textAlign:"center" }}>
              もう 1 件記録すると燃費が計算されます
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:4, marginBottom:12 }}>
            {monthGroups.map(({ mk, records }) => (
              <div key={mk}>
                <button onClick={()=>toggleMonth(mk)} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 4px", background:"transparent", border:"none", cursor:"pointer", marginBottom: isOpen(mk) ? 6 : 0 }}>
                  <span style={{ fontSize:12, fontWeight:700, color:"#4A6090", letterSpacing:"0.06em" }}>{fmtMo(mk)}</span>
                  <span style={{ fontSize:11, color:"#B0C4E0" }}>{isOpen(mk) ? "▲" : "▼"}</span>
                </button>
                {isOpen(mk) && (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {records.map(r => (
                      <div key={r.id} style={{ background:"#fff", borderRadius:14, padding:"14px 16px", border:"1px solid #DDE8F8", boxShadow:"0 1px 6px rgba(30,60,180,0.06)" }}>
                        {editFuelId === r.id && editFuel ? (
                          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                            <div style={{ display:"flex", gap:6 }}>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:10, color:"#4A6090", marginBottom:2 }}>日付</div>
                                <input type="date" value={editFuel.date} onChange={e=>setEditFuel(f=>calcFuel("date",e.target.value,f))} style={inpSm} />
                              </div>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:10, color:"#4A6090", marginBottom:2 }}>ODO（km）</div>
                                <input type="number" value={editFuel.odometer} onChange={e=>setEditFuel(f=>calcFuel("odometer",e.target.value,f))} onFocus={e=>e.target.select()} style={inpSm} inputMode="numeric" />
                              </div>
                            </div>
                            <div style={{ display:"flex", gap:6 }}>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:10, color:"#4A6090", marginBottom:2 }}>単価（円/L）</div>
                                <input type="number" value={editFuel.pricePerLiter} onChange={e=>setEditFuel(f=>calcFuel("pricePerLiter",e.target.value,f))} onFocus={e=>e.target.select()} placeholder="" style={inpSm} inputMode="decimal" />
                              </div>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:10, color:"#4A6090", marginBottom:2 }}>給油量（L）</div>
                                <input type="number" value={editFuel.liters} onChange={e=>setEditFuel(f=>calcFuel("liters",e.target.value,f))} onFocus={e=>e.target.select()} placeholder="" style={inpSm} inputMode="decimal" />
                              </div>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:10, color:"#4A6090", marginBottom:2 }}>金額（円）</div>
                                <input type="number" value={editFuel.amount} onChange={e=>setEditFuel(f=>calcFuel("amount",e.target.value,f))} onFocus={e=>e.target.select()} placeholder="3000" style={inpSm} inputMode="numeric" />
                              </div>
                            </div>
                            <div style={{ display:"flex", gap:6 }}>
                              <button onClick={()=>{setFuelRecords(p=>p.filter(x=>x.id!==r.id));setEditFuelId(null);setEditFuel(null);}} style={{ flex:1, padding:"10px", background:"#FEF0F0", border:"none", borderRadius:10, color:"#C84040", fontSize:13, cursor:"pointer" }}>削除</button>
                              <button onClick={()=>{setEditFuelId(null);setEditFuel(null);}} style={{ flex:1, padding:"10px", background:"#E8EEF8", border:"none", borderRadius:10, color:"#1A2840", fontSize:13, cursor:"pointer" }}>戻る</button>
                              <button onClick={saveEdit} disabled={!canSaveEdit} style={{ flex:2, padding:"10px", background:canSaveEdit?"#2348b8":"#B0C0D8", border:"none", borderRadius:10, color:"#fff", fontSize:13, cursor:canSaveEdit?"pointer":"not-allowed", fontWeight:700 }}>完了</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display:"flex", alignItems:"center", gap:10 }} onClick={()=>startEdit(r)}>
                            <div style={{ flex:1 }}>
                              <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                                <span style={{ fontSize:13, fontWeight:700, color:"#1A2840" }}>{fmtDate(r.date)}</span>
                                <span style={{ fontSize:11, color:"#88A8CC" }}>ODO {r.odometer.toLocaleString()} km</span>
                              </div>
                              <div style={{ display:"flex", gap:10, marginTop:4, alignItems:"center" }}>
                                <span style={{ fontSize:12, color:"#4f7cff", fontWeight:600 }}>+{fmtL(r.liters)}</span>
                                {r.amount && <span style={{ fontSize:11, color:"#B0C0D8" }}>¥{Number(r.amount).toLocaleString()}</span>}
                                {r.dist != null && <span style={{ fontSize:11, color:"#4A6090" }}>+{r.dist.toLocaleString()} km</span>}
                              </div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                              {r.eff != null
                                ? <div style={{ fontSize:16, fontWeight:700, color:"#2348b8" }}>{fmtEff(r.eff)}</div>
                                : <div style={{ fontSize:11, color:"#B0C0D8" }}>（基準点）</div>
                              }
                              <div style={{ fontSize:9, color:"#C5D5EE", marginTop:2 }}>タップで編集</div>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>

          {monthList.length >= 2 && (
            <div style={{ marginTop:20 }}>
              <div style={{ fontSize:12, color:"#4A6090", letterSpacing:"0.08em", fontWeight:600, marginBottom:8 }}>月別グラフ</div>
              {[
                { label:"給油コスト（円）", getValue:d=>d.amount, fmtV:v=>"¥"+Math.round(v), color:"#4f7cff" },
                { label:"給油量（L）",     getValue:d=>d.liters, fmtV:v=>v.toFixed(0)+"L",  color:"#2890A8" },
                { label:"走行距離（km）",  getValue:d=>d.dist,   fmtV:v=>Math.round(v)+"km", color:"#6050C0" },
              ].map(({ label, getValue, fmtV, color }) => {
                const vals = monthList.map(getValue);
                const max  = Math.max(...vals, 0.001);
                return (
                  <div key={label} style={{ ...card, marginBottom:10, padding:"14px 16px" }}>
                    <div style={{ fontSize:11, color:"#4A6090", marginBottom:6 }}>{label}</div>
                    <div style={{ overflowX:"auto" }}>
                      <div style={{ display:"flex", alignItems:"flex-end", gap:4, minWidth: monthList.length * 44, height:90 }}>
                        {monthList.map(d => {
                          const v = getValue(d);
                          const h = v > 0 ? Math.max(Math.round((v / max) * 60), 4) : 0;
                          return (
                            <div key={d.month} style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:"0 0 40px" }}>
                              <div style={{ fontSize:8, color:"#4A6090", marginBottom:2, whiteSpace:"nowrap" }}>{v > 0 ? fmtV(v) : ""}</div>
                              <div style={{ width:24, height:h, background:color, borderRadius:"3px 3px 0 0", minHeight:v>0?4:0 }} />
                              <div style={{ fontSize:9, color:"#88A8CC", marginTop:3 }}>{Number(d.month.split("-")[1])}月</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={{ ...card, padding:"14px 16px" }}>
                <div style={{ fontSize:11, color:"#4A6090", marginBottom:8 }}>月別集計</div>
                <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
                  {[...monthList].reverse().map(m => (
                    <div key={m.month} style={{ display:"flex", gap:6, fontSize:12, padding:"7px 0", borderBottom:"1px solid #f0f5ff" }}>
                      <span style={{ fontWeight:600, color:"#1A2840", minWidth:56 }}>{fmtMo(m.month)}</span>
                      <span style={{ color:"#4f7cff", minWidth:64 }}>{m.amount > 0 ? "¥"+Math.round(m.amount).toLocaleString() : "-"}</span>
                      <span style={{ color:"#2890A8", minWidth:48 }}>{m.liters > 0 ? m.liters.toFixed(1)+"L" : "-"}</span>
                      <span style={{ color:"#6050C0" }}>{m.dist > 0 ? Math.round(m.dist).toLocaleString()+"km" : "-"}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {showFuelData && (
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowFuelData(false)}>
            <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"28px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
              <div style={{ fontSize:15,fontWeight:700,marginBottom:6 }}>燃費データ管理</div>
              <div style={{ fontSize:12,color:"#88A8CC",marginBottom:20 }}>給油記録（{fuelRecords.length}件）を対象とします</div>
              <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                <button onClick={exportFuel} style={{ padding:"15px",background:"#2348b8",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                  <span style={{ fontSize:18,marginRight:10 }}>📤</span>書き出し（JSONダウンロード）
                </button>
                <button onClick={()=>fuelImportRef.current.click()} style={{ padding:"15px",background:"#EEF4FF",border:"2px solid #B0C4F0",borderRadius:14,color:"#2348b8",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                  <span style={{ fontSize:18,marginRight:10 }}>📥</span>読み込み（JSONを選択）
                </button>
                <input ref={fuelImportRef} type="file" accept=".json" onChange={importFuel} style={{ display:"none" }} />
              </div>
              <button onClick={()=>setShowFuelData(false)} style={{ marginTop:16,width:"100%",padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>閉じる</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ===== 給与・手当 =====
  if (page === "salary") {
    const allowFields = [
      { key:"nightWeekday",    label:"夜勤（平日）",  dateKey:"nightWeekdayDate" },
      { key:"nightPreHoliday", label:"夜勤（休前）",  dateKey:"nightPreHolidayDate" },
      { key:"nightHoliday",    label:"夜勤（休日）",  dateKey:"nightHolidayDate" },
      { key:"overtimeRate",    label:"残業時給",      dateKey:"overtimeRateDate" },
    ];
    const latestSalary = salaryHist.length > 0 ? salaryHist[salaryHist.length - 1] : null;
    const olderSalary  = salaryHist.slice(0, -1);
    const renderSalaryCard = s => (
      <div key={s.id} style={card}>
        {editSalaryId === s.id ? (
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            <input value={s.note} onChange={e=>setSalaryHist(p=>p.map(x=>x.id===s.id?{...x,note:e.target.value}:x))} style={{...inp,marginTop:0}} placeholder="基本給、改定後…" />
            <input type="number" value={s.amount} onChange={e=>setSalaryHist(p=>p.map(x=>x.id===s.id?{...x,amount:Number(e.target.value)}:x))} onFocus={e=>e.target.select()} style={{...inp,marginTop:0}} inputMode="numeric" />
            <input value={s.date} onChange={e=>setSalaryHist(p=>p.map(x=>x.id===s.id?{...x,date:e.target.value}:x))} style={{...inp,marginTop:0}} placeholder="R7.4/25~" />
            <div style={{ display:"flex",gap:8 }}>
              <button onClick={()=>{setSalaryHist(p=>p.filter(x=>x.id!==s.id));setEditSalaryId(null);}} style={{ flex:1,padding:"10px",background:"#FEF0F0",border:"none",borderRadius:10,color:"#C84040",fontSize:13,cursor:"pointer" }}>削除</button>
              <button onClick={()=>setEditSalaryId(null)} style={{ flex:2,padding:"10px",background:"#1C3561",border:"none",borderRadius:10,color:"#fff",fontSize:13,cursor:"pointer" }}>完了</button>
            </div>
          </div>
        ) : (
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14,fontWeight:600 }}>{s.note||"基本給"}</div>
              {s.date && <div style={{ fontSize:11,color:"#88A8CC",marginTop:2 }}>{s.date}</div>}
            </div>
            <div style={{ fontWeight:700,fontSize:15 }}>{yen(s.amount)}</div>
            <button onClick={()=>setEditSalaryId(s.id)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14 }}>✏️</button>
          </div>
        )}
      </div>
    );
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:40 }}>
        <SubHeader title="給与・手当" sub="SALARY" />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>

          <div style={{ marginBottom:8, fontSize:11, fontWeight:700, color:"#4A6090", letterSpacing:"0.08em" }}>月の給料</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:8 }}>
            {latestSalary && renderSalaryCard(latestSalary)}
            {olderSalary.length > 0 && (
              <>
                <button onClick={()=>setSalaryExpanded(e=>!e)} style={{ padding:"6px 4px",background:"none",border:"none",color:"#88A8CC",fontSize:12,cursor:"pointer",textAlign:"left" }}>
                  {salaryExpanded ? "▲ 履歴を隠す" : `▼ 過去の給与履歴（${olderSalary.length}件）`}
                </button>
                {salaryExpanded && [...olderSalary].reverse().map(s => renderSalaryCard(s))}
              </>
            )}
          </div>
          <button onClick={()=>setShowAddSalary(true)} style={{ marginBottom:20,width:"100%",padding:"13px",background:"transparent",border:"2px dashed #A8C0EC",borderRadius:14,color:"#3B6FCC",fontSize:14,cursor:"pointer",fontWeight:600 }}>＋ 基本給を追加</button>

          <div style={{ marginBottom:8, fontSize:11, fontWeight:700, color:"#4A6090", letterSpacing:"0.08em" }}>夜勤・残業手当</div>
          <div style={card}>
            {allowFields.map(({ key, label, dateKey }, i) => (
              <div key={key} style={{ padding:"10px 0",borderBottom: i < allowFields.length-1 ? "1px solid #EEF3FF" : "none" }}>
                <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                  <div style={{ flex:1,fontSize:13,color:"#4A6090" }}>{label}</div>
                  {editAllowField === key ? (
                    <button onClick={()=>{setAllowances(a=>({...a,[key]:Number(editAllowVal),[dateKey]:editAllowDate}));setEditAllowField(null);}} style={{ padding:"6px 12px",background:"#1C3561",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer" }}>完了</button>
                  ) : (
                    <>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontWeight:700,fontSize:14 }}>{yen(allowances[key])}</div>
                        {allowances[dateKey] && <div style={{ fontSize:10,color:"#88A8CC",marginTop:1 }}>{allowances[dateKey]}</div>}
                      </div>
                      <button onClick={()=>{setEditAllowField(key);setEditAllowVal(String(allowances[key]));setEditAllowDate(allowances[dateKey]||"");}} style={{ background:"#EEF2FF",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:13 }}>✏️</button>
                    </>
                  )}
                </div>
                {editAllowField === key && (
                  <div style={{ display:"flex",gap:8,marginTop:8 }}>
                    <input type="number" value={editAllowVal} onChange={e=>setEditAllowVal(e.target.value)} onFocus={e=>e.target.select()} style={{ flex:1,padding:"8px",border:"1px solid #C5D5EE",borderRadius:8,fontSize:14,color:"#1A2840",outline:"none" }} inputMode="decimal" autoFocus />
                    <input value={editAllowDate} onChange={e=>setEditAllowDate(e.target.value)} style={{ flex:1,padding:"8px",border:"1px solid #C5D5EE",borderRadius:8,fontSize:13,color:"#1A2840",outline:"none" }} placeholder="R7.4/25~" />
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {showAddSalary && (
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowAddSalary(false)}>
            <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
              <div style={{ fontSize:15,fontWeight:700,marginBottom:16 }}>基本給を追加</div>
              <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>メモ</label><input value={newSalary.note} onChange={e=>setNewSalary(s=>({...s,note:e.target.value}))} style={inp} placeholder="基本給、改定後…" /></div>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>金額</label><input type="number" value={newSalary.amount} onChange={e=>setNewSalary(s=>({...s,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="170000" /></div>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>適用日</label><input value={newSalary.date} onChange={e=>setNewSalary(s=>({...s,date:e.target.value}))} style={inp} placeholder="R7.4/25~" /></div>
              </div>
              <div style={{ display:"flex",gap:10,marginTop:20 }}>
                <button onClick={()=>{setShowAddSalary(false);setNewSalary({date:"",amount:"",note:""});}} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
                <button onClick={()=>{
                  if(!newSalary.amount) return;
                  setSalaryHist(p=>[...p,{id:Date.now(),date:newSalary.date,amount:Number(newSalary.amount),note:newSalary.note}]);
                  setNewSalary({date:"",amount:"",note:""});
                  setShowAddSalary(false);
                }} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>追加</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ===== ホーム =====
  return (
    <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:80 }}>
      <div style={{ background:"linear-gradient(160deg, #1C3561 0%, #2A4890 100%)",color:"#F0F5FF",padding:"16px 20px 18px",paddingTop:"max(env(safe-area-inset-top),16px)",position:"sticky",top:0,zIndex:100 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14 }}>
          <div>
            <div style={{ fontSize:10,letterSpacing:"0.15em",color:"#7AAAE0",marginBottom:2 }}>HOUSEHOLD BUDGET</div>
            <div style={{ fontSize:22,fontWeight:700 }}>{current.month.split("年")[0]}年</div>
            <div style={{ fontSize:22,fontWeight:700 }}>{current.month.split("年")[1]}</div>
          </div>
          <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4 }}>
            <div style={{ display:"flex",gap:5 }}>
              <NavBtn label="固定"   onClick={()=>setPage("fixed")} />
              <NavBtn label="臨時"   onClick={()=>setPage("occasional")} />
              <NavBtn label="出費"   onClick={()=>setPage("expenses")} />
              <NavBtn label="賞与"   onClick={()=>setPage("bonus")} />
              <NavBtn label="履歴"   onClick={()=>setPage("history")} />
              <NavBtn label="⚙️"    onClick={()=>setShowData(true)} />
            </div>
            <div style={{ display:"flex",gap:5 }}>
              <NavBtn label="👕"      onClick={()=>setPage("salary")} />
              <NavBtn label="🚗"      onClick={()=>setPage("fuel")} />
            </div>
          </div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.10)",borderRadius:16,padding:"16px",border:"1px solid rgba(255,255,255,0.15)" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
            <div style={{ fontSize:11,color:"#90B8F0" }}>今月の残り</div>
            <button onClick={()=>setHideNums(h=>!h)} style={{ background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#90B8F0",cursor:"pointer",letterSpacing:"0.05em" }}>{hideNums?"表示":"隠す"}</button>
          </div>
          <div style={{ fontSize:34,fontWeight:700,color:hideNums?"#90B8F0":"#fff",letterSpacing:"-0.02em" }}>{maskY(yen(displayBalance))}</div>
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:8 }}>
            <span>収入 {maskY(yen(income))}</span>
            <span>支出 {maskY(yen(totalOut))}{includePlanned && plannedTotal > 0 ? `＋予定${maskY(yen(plannedTotal))}` : ""}</span>
          </div>
          <div style={{ marginTop:10,background:"rgba(0,0,0,0.25)",borderRadius:4,height:5,overflow:"hidden" }}>
            <div style={{ height:"100%",borderRadius:4,width:income>0?`${Math.min(((totalOut+(includePlanned?plannedTotal:0))/income)*100,100)}%`:"0%",background:(totalOut+(includePlanned?plannedTotal:0))/income>0.9?"#C84040":(totalOut+(includePlanned?plannedTotal:0))/income>0.7?"#D4901A":"#60A8F0",transition:"width 0.4s ease" }} />
          </div>
        </div>
      </div>

      <div style={{ maxWidth:480,margin:"0 auto",padding:"0 16px" }}>
        <div style={{ marginTop:20,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:4 }}>今月の手取り</div>
          {hideNums
            ? <div style={{...inp,marginTop:0,fontSize:20,fontWeight:700,color:"#B0C0D8",display:"flex",alignItems:"center"}}>¥----</div>
            : <input type="number" value={current.income} onChange={e=>setCurrent(c=>({...c,income:e.target.value}))} onFocus={e=>e.target.select()} style={{...inp,marginTop:0,fontSize:20,fontWeight:700}} inputMode="numeric" />
          }
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:12 }}>変動支出</div>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {varItems.map(v => (
              <div key={v.id}>
                {editVarId===v.id ? (
                  <div style={{ display:"flex",gap:6,marginBottom:4 }}>
                    <input value={editVarName} onChange={e=>setEditVarName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveVarName(v.id)}
                      style={{ flex:1,padding:"7px 10px",background:"#fff",border:"1px solid #C5D5EE",borderRadius:8,fontSize:13,color:"#1A2840",outline:"none" }} />
                    <button onClick={()=>saveVarName(v.id)} style={{ padding:"7px 12px",background:"#1C3561",border:"none",borderRadius:8,color:"#fff",fontSize:12,cursor:"pointer" }}>完了</button>
                    <button onClick={()=>deleteVarItem(v.id)} style={{ padding:"7px 10px",background:"#FEF0F0",border:"none",borderRadius:8,color:"#C84040",fontSize:12,cursor:"pointer" }}>削除</button>
                  </div>
                ) : (
                  <div style={{ display:"flex",alignItems:"center",gap:4,marginBottom:3 }}>
                    <label style={{ fontSize:12,color:"#4A6090",flex:1 }}>{v.name}</label>
                    <button onClick={()=>{setEditVarId(v.id);setEditVarName(v.name);}} style={{ background:"#EEF2FF",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12 }}>✏️</button>
                    <button onClick={()=>deleteVarItem(v.id)} style={{ background:"#FEF0F0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:13,color:"#C84040",fontWeight:700 }}>×</button>
                  </div>
                )}
                <input type="number" value={v.amount} onChange={e=>updateVarAmount(v.id,e.target.value)} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" />
              </div>
            ))}
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:4 }}>
              <div style={{ fontSize:12,color:isOddMonth?"#4A6090":"#A0B0C8" }}>NHK（¥3,900）</div>
              <div style={{ fontSize:10,fontWeight:600,color:isOddMonth?"#3B6FCC":"#A0B0C8",background:isOddMonth?"#EEF4FF":"#F0F2F8",borderRadius:6,padding:"2px 8px" }}>{isOddMonth?"自動追加":"今月なし"}</div>
            </div>
            {showAddVar ? (
              <div style={{ display:"flex",gap:6 }}>
                <input value={newVarName} onChange={e=>setNewVarName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addVarItem()}
                  style={{ flex:1,padding:"9px 12px",background:"#fff",border:"1px solid #B0C4F0",borderRadius:8,fontSize:13,color:"#1A2840",outline:"none" }}
                  placeholder="項目名" autoFocus />
                <button onClick={addVarItem} style={{ padding:"9px 14px",background:"#1C3561",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:600 }}>追加</button>
                <button onClick={()=>{setShowAddVar(false);setNewVarName("");}} style={{ padding:"9px 10px",background:"#E0E8F8",border:"none",borderRadius:8,color:"#4060A0",fontSize:13,cursor:"pointer" }}>×</button>
              </div>
            ) : (
              <button onClick={()=>setShowAddVar(true)} style={{ padding:"9px",width:"100%",background:"transparent",border:"1.5px dashed #A8C0EC",borderRadius:8,color:"#3B6FCC",fontSize:12,cursor:"pointer" }}>＋ 項目を追加</button>
            )}
          </div>
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>固定支出合計</div>
            <div style={{ fontSize:16,fontWeight:700 }}>{maskY(yen(fixedTotal))}</div>
          </div>
          <div style={{ marginTop:10,display:"flex",flexWrap:"wrap",gap:6 }}>
            {fixed.map(f=>(
              <div key={f.id} style={{ background:"#EEF2FF",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#3A5CA8" }}>{f.name} {maskY(yen(f.amount))}</div>
            ))}
          </div>
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:(current.occasionals||[]).length>0?10:0 }}>
            <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>
              臨時支出 {occTotal>0&&<span style={{ fontWeight:700,color:"#1A2840" }}>合計 {maskY(yen(occTotal))}</span>}
            </div>
            <button onClick={()=>setShowOcc(true)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,color:"#3B6FCC",cursor:"pointer",fontWeight:600 }}>＋追加</button>
          </div>
          {(current.occasionals||[]).map(o=>(
            <div key={o.id} style={{ display:"flex",alignItems:"center",gap:8,marginTop:8 }}>
              <span style={{ flex:1,fontSize:13 }}>{o.name}</span>
              <span style={{ fontWeight:600,fontSize:13 }}>{maskY(yen(o.amount))}</span>
              <button onClick={()=>setCurrent(c=>({...c,occasionals:c.occasionals.filter(x=>x.id!==o.id)}))} style={{ background:"#FEF0F0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,color:"#C84040" }}>×</button>
            </div>
          ))}
        </div>

        {(cashExpTotal > 0 || creditExpTotal > 0) && (
          <div style={{ marginTop:12,...card, padding:"14px 16px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
              <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>出費</div>
              <button onClick={()=>setPage("expenses")} style={{ fontSize:11,color:"#3B6FCC",background:"none",border:"none",cursor:"pointer" }}>一覧 →</button>
            </div>
            <div style={{ display:"flex",gap:12 }}>
              {cashExpTotal>0&&<div style={{ fontSize:13 }}>現金 <span style={{ fontWeight:700 }}>{maskY(yen(cashExpTotal))}</span></div>}
              {creditExpTotal>0&&<div style={{ fontSize:13,color:"#4060A0" }}>CR <span style={{ fontWeight:700 }}>{maskY(yen(creditExpTotal))}</span><span style={{ fontSize:10,color:"#88A8CC",marginLeft:4 }}>別管理</span></div>}
            </div>
          </div>
        )}

        <div style={{ marginTop:12,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:10 }}>支出内訳</div>
          {[
            { label:"固定支出",   val:fixedTotal },
            ...varItems.filter(v=>(Number(v.amount)||0)>0).map(v=>({ label:v.name, val:Number(v.amount)||0 })),
            { label:"NHK",        val:nhkVal },
            { label:"臨時支出", val:occTotal },
            { label:"現金支出",   val:cashExpTotal },
          ].filter(r=>r.val>0).map((r,i)=>(
            <div key={i} style={{ display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:"1px solid #EEF3FF" }}>
              <span style={{ color:"#5070A0" }}>{r.label}</span>
              <span style={{ fontWeight:600 }}>{maskY(yen(r.val))}</span>
            </div>
          ))}
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,paddingTop:10,marginTop:4 }}>
            <span>合計</span><span>{maskY(yen(totalOut))}</span>
          </div>
          {creditExpTotal>0&&(
            <div style={{ marginTop:8,paddingTop:8,borderTop:"1px dashed #DDE8F8",display:"flex",justifyContent:"space-between",fontSize:12,color:"#4060A0" }}>
              <span>クレジット利用（別管理）</span>
              <span style={{ fontWeight:600 }}>{maskY(yen(creditExpTotal))}</span>
            </div>
          )}
        </div>

        <button onClick={()=>setShowClose(true)} style={{ marginTop:16,width:"100%",padding:"15px",background:"linear-gradient(135deg, #1C3561, #2A4890)",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,letterSpacing:"0.05em" }}>今月を締める →</button>
      </div>

      {showOcc&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowOcc(false)}>
          <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:16 }}>臨時支出を追加</div>
            {occMaster.length>0&&(
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:11,color:"#4A6090",marginBottom:8 }}>リストから選ぶ</div>
                <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                  {occMaster.map(m=>(<button key={m.id} onClick={()=>{addToThisMonth(m);setShowOcc(false);}} style={{ background:"#EEF4FF",border:"1px solid #B0C4F0",borderRadius:8,padding:"5px 10px",fontSize:12,color:"#3B6FCC",cursor:"pointer" }}>{m.name}　{yen(m.amount)}</button>))}
                </div>
                <div style={{ fontSize:11,color:"#88A8CC",margin:"12px 0 8px" }}>または手入力</div>
              </div>
            )}
            <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
              <div><label style={{ fontSize:11,color:"#4A6090" }}>項目名</label><input value={occInput.name} onChange={e=>setOccInput(o=>({...o,name:e.target.value}))} style={inp} placeholder="自動車税、奨学金…" /></div>
              <div><label style={{ fontSize:11,color:"#4A6090" }}>金額</label><input type="number" value={occInput.amount} onChange={e=>setOccInput(o=>({...o,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" /></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button onClick={()=>setShowOcc(false)} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
              <button onClick={addOccasional} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>追加</button>
            </div>
          </div>
        </div>
      )}

      {showClose&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center" }}>
          <div style={{ background:"#fff",borderRadius:20,padding:"28px 24px",maxWidth:320,width:"90%",boxShadow:"0 8px 32px rgba(30,60,180,0.18)" }}>
            <div style={{ fontSize:16,fontWeight:700,marginBottom:6 }}>今月を締めますか？</div>
            <div style={{ background:"#EEF3FF",borderRadius:14,padding:"14px",margin:"16px 0",border:"1px solid #DDE8F8" }}>
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6 }}><span style={{ color:"#5070A0" }}>手取り</span><span style={{ fontWeight:600 }}>{yen(income)}</span></div>
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6 }}><span style={{ color:"#5070A0" }}>支出合計</span><span style={{ fontWeight:600 }}>{yen(totalOut)}</span></div>
              {creditExpTotal>0&&<div style={{ display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,color:"#4060A0" }}><span>CR利用（別）</span><span>{yen(creditExpTotal)}</span></div>}
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:15,borderTop:"1px solid #C5D5EE",paddingTop:8,marginTop:4 }}><span style={{ color:"#5070A0" }}>残り</span><span style={{ fontWeight:700,color:balColor }}>{yen(balance)}</span></div>
            </div>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setShowClose(false)} style={{ flex:1,padding:"12px",background:"#EEF2FF",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#4060A0" }}>やめる</button>
              <button onClick={closeMonth} style={{ flex:2,padding:"12px",background:"#1C3561",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>締める</button>
            </div>
          </div>
        </div>
      )}

      {showData&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowData(false)}>
          <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"28px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:6 }}>データ管理</div>
            <div style={{ fontSize:12,color:"#88A8CC",marginBottom:20 }}>全データ（固定支出・履歴・当月・不定期マスター）を対象とします</div>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              <button onClick={exportData} style={{ padding:"15px",background:"#1C3561",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📤</span>書き出し（JSONダウンロード）
              </button>
              <button onClick={()=>importRef.current.click()} style={{ padding:"15px",background:"#EEF4FF",border:"2px solid #B0C4F0",borderRadius:14,color:"#1C3561",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📥</span>読み込み（JSONを選択）
              </button>
              <input ref={importRef} type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
            </div>
            <button onClick={()=>setShowData(false)} style={{ marginTop:16,width:"100%",padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
