<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家計簿" />
  <title>家計簿</title>
  <link rel="apple-touch-icon" href="kakeibo-icon.png">
  <link rel="icon" href="kakeibo-icon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #EEF3FF; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; color: #1A2840; }
    input, select, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<!-- v10 -->
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const SK = {
  fixed:     "kb_fixed",
  history:   "kb_history",
  current:   "kb_current",
  occMaster: "kb_occ_master",
  expCats:   "kb_exp_cats",
};

const DEFAULT_EXP_CATS = [
  { id:1, name:"食費" },
  { id:2, name:"日用品" },
  { id:3, name:"交通費" },
  { id:4, name:"その他" },
];

const DEFAULT_FIXED = [
  { id:1,  name:"家賃",     amount:40000, day:"末日" },
  { id:2,  name:"電気",     amount:5959,  day:"5日" },
  { id:10, name:"ガス",     amount:0,     day:"5日" },
  { id:4,  name:"明治保険", amount:12961, day:"27日" },
  { id:5,  name:"車保険",   amount:9230,  day:"27日" },
  { id:6,  name:"ニコス",   amount:13400, day:"27日" },
  { id:7,  name:"ガソリン", amount:9000,  day:"月初" },
  { id:8,  name:"整骨院",   amount:7700,  day:"月初" },
  { id:9,  name:"食費",     amount:25000, day:"月初" },
];

const DEFAULT_OCC_MASTER = [
  { id:1, name:"NHK",                    amount:3900,  note:"2ケ月ごと(偶数月)" },
  { id:2, name:"自動車税",               amount:12900, note:"5月(ペイ払い可)" },
  { id:3, name:"火災+家更新",            amount:35000, note:"9月・2年ごと(奇数年)" },
  { id:4, name:"オイル・エレメント交換", amount:4000,  note:"不定期(前R7.9/26)" },
  { id:5, name:"カット・FCなど",         amount:4000,  note:"不定期" },
  { id:6, name:"奨学金 最終回",          amount:63245, note:"2026/07/27" },
];

const DEFAULT_VAR_ITEMS = [
  { id:1, name:"携帯(UQ)", amount:0 },
  { id:2, name:"メルカリ", amount:0 },
  { id:3, name:"Paidy",    amount:0 },
];

const DEFAULT_CURRENT = {
  month: currentMonthLabel(),
  income: 220000,
  nhk: false,
  varItems: DEFAULT_VAR_ITEMS,
  occasionals: [],
  expenses: [],
  note: "",
};

function currentMonthLabel() {
  const d = new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月`;
}

function todayStr() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}

const yen = n => "¥" + Number(Math.round(n)).toLocaleString("ja-JP");
const lsGet = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
const lsSet = (k, v) => localStorage.setItem(k, JSON.stringify(v));

function DayPicker({ day, maxDay, monthNum, onChange }) {
  const itemH = 40;
  const containerH = 120;
  const padH = (containerH - itemH) / 2;
  const scrollRef = useRef(null);
  const timer = useRef(null);
  const cbRef = useRef(onChange);
  useEffect(() => { cbRef.current = onChange; });

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = (day - 1) * itemH;
    }
  }, []);

  function handleScroll(e) {
    clearTimeout(timer.current);
    const st = e.target.scrollTop;
    timer.current = setTimeout(() => {
      const d = Math.max(1, Math.min(maxDay, Math.round(st / itemH) + 1));
      cbRef.current(d);
    }, 80);
  }

  return (
    <div style={{ position:"relative",height:containerH,borderRadius:10,border:"1px solid #C5D5EE",overflow:"hidden",background:"#fff" }}>
      <div style={{ position:"absolute",top:0,left:0,right:0,height:padH,background:"linear-gradient(to bottom, rgba(255,255,255,0.95) 50%, transparent)",pointerEvents:"none",zIndex:2 }} />
      <div style={{ position:"absolute",bottom:0,left:0,right:0,height:padH,background:"linear-gradient(to top, rgba(255,255,255,0.95) 50%, transparent)",pointerEvents:"none",zIndex:2 }} />
      <div style={{ position:"absolute",top:padH,left:0,right:0,height:itemH,borderTop:"1.5px solid #B0C4F0",borderBottom:"1.5px solid #B0C4F0",pointerEvents:"none",zIndex:1 }} />
      <div style={{ position:"absolute",right:8,top:padH,height:itemH,display:"flex",alignItems:"center",fontSize:11,color:"#88A8CC",fontWeight:600,pointerEvents:"none",zIndex:3 }}>{monthNum}月</div>
      <div ref={scrollRef} onScroll={handleScroll} style={{ position:"absolute",inset:0,overflowY:"scroll",scrollSnapType:"y mandatory" }}>
        <div style={{ height:padH }} />
        {Array.from({ length:maxDay }, (_,i) => i+1).map(d => (
          <div key={d} style={{ height:itemH,display:"flex",alignItems:"center",justifyContent:"center",scrollSnapAlign:"center",fontSize:18,fontWeight:600,color:"#1A2840" }}>{d}</div>
        ))}
        <div style={{ height:padH }} />
      </div>
    </div>
  );
}

function App() {
  const [page, setPage]           = useState("home");
  const [fixed, setFixed]         = useState(() => lsGet(SK.fixed, DEFAULT_FIXED));
  const [history, setHistory]     = useState(() => lsGet(SK.history, []));
  const [current, setCurrent]     = useState(() => lsGet(SK.current, DEFAULT_CURRENT));
  const [occMaster, setOccMaster] = useState(() => lsGet(SK.occMaster, DEFAULT_OCC_MASTER));
  const [showClose, setShowClose] = useState(false);
  const [editFixed, setEditFixed] = useState(null);
  const [showOcc,   setShowOcc]   = useState(false);
  const [occInput,  setOccInput]  = useState({ name:"", amount:"" });
  const [hideNums,  setHideNums]  = useState(false);
  const [editOcc,   setEditOcc]   = useState(null);
  const [showAddOcc, setShowAddOcc] = useState(false);
  const [newOcc,    setNewOcc]    = useState({ name:"", amount:"", note:"" });
  const [showData,  setShowData]  = useState(false);
  const [editVarId, setEditVarId] = useState(null);
  const [editVarName, setEditVarName] = useState("");
  const [showAddVar, setShowAddVar] = useState(false);
  const [newVarName, setNewVarName] = useState("");
  const [showAddExp, setShowAddExp] = useState(false);
  const [newExp,    setNewExp]    = useState({ date: todayStr(), name:"", amount:"", type:"cash", catId:1 });
  const [expCats,   setExpCats]   = useState(() => lsGet(SK.expCats, DEFAULT_EXP_CATS));
  const [editCatId, setEditCatId] = useState(null);
  const [editCatName, setEditCatName] = useState("");
  const [filterCat,  setFilterCat]  = useState(null);
  const [showAddCat, setShowAddCat] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const importRef = useRef(null);

  useEffect(() => {
    if (!current.varItems) {
      const keitai   = Number(current.keitai)   || 0;
      const merukari = Number(current.merukari) || 0;
      const paidy    = Number(current.paidy)    || 0;
      const migrated = DEFAULT_VAR_ITEMS.map(v => {
        if (v.name === "携帯(UQ)") return { ...v, amount: keitai };
        if (v.name === "メルカリ") return { ...v, amount: merukari };
        if (v.name === "Paidy")    return { ...v, amount: paidy };
        return v;
      });
      setCurrent(c => ({ ...c, varItems: migrated }));
    }
  }, []);

  useEffect(() => lsSet(SK.fixed,     fixed),     [fixed]);
  useEffect(() => lsSet(SK.history,   history),   [history]);
  useEffect(() => lsSet(SK.current,   current),   [current]);
  useEffect(() => lsSet(SK.occMaster, occMaster), [occMaster]);
  useEffect(() => lsSet(SK.expCats,   expCats),   [expCats]);

  const varItems      = current.varItems  || DEFAULT_VAR_ITEMS;
  const expenses      = current.expenses  || [];
  const fixedTotal    = useMemo(() => fixed.reduce((s,f) => s + f.amount, 0), [fixed]);
  const varTotal      = varItems.reduce((s,v) => s + (Number(v.amount)||0), 0);
  const cashExpTotal  = expenses.filter(e => e.type === "cash").reduce((s,e) => s + (Number(e.amount)||0), 0);
  const creditExpTotal= expenses.filter(e => e.type === "credit").reduce((s,e) => s + (Number(e.amount)||0), 0);
  const monthNum      = Number((current.month.match(/(\d+)月/) || [])[1] || 0);
  const isEvenMonth   = monthNum % 2 === 0;
  const nhkVal        = (current.nhk && isEvenMonth) ? 3900 : 0;
  const occTotal      = (current.occasionals||[]).reduce((s,o) => s + (Number(o.amount)||0), 0);
  const totalOut      = fixedTotal + varTotal + nhkVal + occTotal + cashExpTotal;
  const income        = Number(current.income) || 0;
  const balance       = income - totalOut;
  const balColor      = balance < 0 ? "#C84040" : balance < 20000 ? "#D4901A" : "#2A7A5A";

  function closeMonth() {
    const rec = {
      month: current.month, income, totalOut, balance,
      fixed: fixedTotal, nhk: nhkVal, varItems,
      occasionals: current.occasionals || [],
      cashExpTotal, creditExpTotal,
      expenses,
      closedAt: new Date().toISOString(),
    };
    setHistory(prev => [rec, ...prev]);
    const next = new Date();
    next.setMonth(next.getMonth() + 1);
    const nextVarItems = varItems.map(v => ({ ...v, amount: 0 }));
    setCurrent({ ...DEFAULT_CURRENT, month: `${next.getFullYear()}年${next.getMonth()+1}月`, varItems: nextVarItems });
    setShowClose(false);
  }

  function updateFixed(id, field, val) {
    setFixed(prev => prev.map(f => f.id === id ? {...f, [field]: field==="amount" ? Number(val)||0 : val} : f));
  }

  function updateVarAmount(id, val) {
    setCurrent(c => ({...c, varItems: (c.varItems||[]).map(v => v.id === id ? {...v, amount: Number(val)||0} : v)}));
  }

  function saveVarName(id) {
    if (!editVarName.trim()) return;
    setCurrent(c => ({...c, varItems: (c.varItems||[]).map(v => v.id === id ? {...v, name: editVarName.trim()} : v)}));
    setEditVarId(null);
  }

  function deleteVarItem(id) {
    setCurrent(c => ({...c, varItems: (c.varItems||[]).filter(v => v.id !== id)}));
    setEditVarId(null);
  }

  function addVarItem() {
    if (!newVarName.trim()) return;
    const item = { id: Date.now(), name: newVarName.trim(), amount: 0 };
    setCurrent(c => ({...c, varItems: [...(c.varItems||[]), item]}));
    setNewVarName("");
    setShowAddVar(false);
  }

  function addExpense() {
    if (!newExp.name || !newExp.amount) return;
    const item = { id: Date.now(), date: newExp.date, name: newExp.name, amount: Number(newExp.amount)||0, type: newExp.type, catId: newExp.catId };
    setCurrent(c => ({...c, expenses: [...(c.expenses||[]), item]}));
    setNewExp({ date: todayStr(), name:"", amount:"", type: newExp.type, catId: newExp.catId });
    setShowAddExp(false);
  }

  function saveCatName(id) {
    if (!editCatName.trim()) return;
    setExpCats(prev => prev.map(c => c.id === id ? {...c, name: editCatName.trim()} : c));
    setEditCatId(null);
  }

  function addCat() {
    if (!newCatName.trim()) return;
    setExpCats(prev => [...prev, { id: Date.now(), name: newCatName.trim() }]);
    setNewCatName("");
    setShowAddCat(false);
  }

  function deleteExpense(id) {
    setCurrent(c => ({...c, expenses: (c.expenses||[]).filter(e => e.id !== id)}));
  }

  function addOccasional() {
    if (!occInput.name || !occInput.amount) return;
    const item = { id: Date.now(), name: occInput.name, amount: Number(occInput.amount)||0 };
    setCurrent(c => ({...c, occasionals: [...(c.occasionals||[]), item]}));
    setOccInput({ name:"", amount:"" });
    setShowOcc(false);
  }

  function addToThisMonth(master) {
    const item = { id: Date.now(), name: master.name, amount: master.amount };
    setCurrent(c => ({...c, occasionals: [...(c.occasionals||[]), item]}));
  }

  function updateOccMaster(id, field, val) {
    setOccMaster(prev => prev.map(o => o.id === id ? {...o, [field]: field==="amount" ? Number(val)||0 : val} : o));
  }

  function addOccMaster() {
    if (!newOcc.name) return;
    const item = { id: Date.now(), name: newOcc.name, amount: Number(newOcc.amount)||0, note: newOcc.note };
    setOccMaster(prev => [...prev, item]);
    setNewOcc({ name:"", amount:"", note:"" });
    setShowAddOcc(false);
  }

  function exportData() {
    const data = {
      [SK.fixed]:     fixed,
      [SK.history]:   history,
      [SK.current]:   current,
      [SK.occMaster]: occMaster,
      [SK.expCats]:   expCats,
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `kakeibo_${current.month.replace("年","-").replace("月","")}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setShowData(false);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data[SK.fixed])     setFixed(data[SK.fixed]);
        if (data[SK.history])   setHistory(data[SK.history]);
        if (data[SK.current])   setCurrent(data[SK.current]);
        if (data[SK.occMaster]) setOccMaster(data[SK.occMaster]);
        if (data[SK.expCats])   setExpCats(data[SK.expCats]);
        setShowData(false);
      } catch {
        alert("読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const inp = {
    width:"100%", padding:"11px 13px", marginTop:5,
    background:"#fff", border:"1px solid #C5D5EE",
    borderRadius:10, fontSize:15, color:"#1A2840", outline:"none"
  };

  const card = {
    background:"#fff", borderRadius:16, padding:"16px",
    boxShadow:"0 2px 10px rgba(30,60,180,0.07)", border:"1px solid #DDE8F8"
  };

  const maskY = v => hideNums ? "¥----" : v;

  const NavBtn = ({ label, onClick }) => (
    <button onClick={onClick} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:8, padding:"6px 10px", color:"#C8DEFF", fontSize:11, cursor:"pointer" }}>{label}</button>
  );

  const SubHeader = ({ title, sub }) => (
    <div style={{
      background:"linear-gradient(135deg, #1C3561 0%, #2A4890 100%)", color:"#F0F5FF",
      padding:"16px 20px 18px",
      paddingTop:"max(env(safe-area-inset-top),16px)",
      position:"sticky", top:0, zIndex:100
    }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={() => setPage("home")} style={{
          background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:8,
          padding:"6px 12px", color:"#D8EEFF", fontSize:13, cursor:"pointer"
        }}>← 戻る</button>
        <div>
          <div style={{ fontSize:10, letterSpacing:"0.15em", color:"#7AAAE0" }}>{sub}</div>
          <div style={{ fontSize:20, fontWeight:700 }}>{title}</div>
        </div>
      </div>
    </div>
  );

  // ===== 履歴 =====
  if (page === "history") {
    const maxBal = Math.max(...history.map(h => Math.abs(h.balance)), 1);
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:40 }}>
        <SubHeader title="月別履歴" sub="HISTORY" />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>
          {history.length === 0 ? (
            <div style={{ ...card, padding:"40px 16px", textAlign:"center", color:"#88A8CC", fontSize:14 }}>まだ締めた月がありません</div>
          ) : (
            <>
              <div style={{ ...card, marginBottom:16 }}>
                <div style={{ fontSize:11, color:"#7090B8", marginBottom:12, letterSpacing:"0.08em" }}>残高推移</div>
                <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:80 }}>
                  {[...history].reverse().slice(-6).map((h,i) => {
                    const pct = Math.abs(h.balance)/maxBal;
                    const isNeg = h.balance < 0;
                    return (
                      <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                        <div style={{ fontSize:9, color:isNeg?"#C84040":"#3060B0", fontWeight:600 }}>{hideNums?"-":(isNeg?"-":"+")+Math.abs(Math.round(h.balance/1000))+"k"}</div>
                        <div style={{ width:"100%", borderRadius:4, height:Math.max(pct*60,4), background:isNeg?"#E8A0A0":"#6090E0" }} />
                        <div style={{ fontSize:9, color:"#88A8CC" }}>{h.month.replace(/\d{4}年/,"").replace("月","")}月</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {history.map((h,i) => (
                  <div key={i} style={{ ...card }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
                      <span style={{ fontSize:16, fontWeight:700 }}>{h.month}</span>
                      <span style={{ fontSize:18, fontWeight:700, color:h.balance<0?"#C84040":"#2A7A5A" }}>{maskY(yen(h.balance))}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#5070A0" }}>
                      <span>手取 {maskY(yen(h.income))}</span>
                      <span>支出 {maskY(yen(h.totalOut))}</span>
                    </div>
                    {h.cashExpTotal > 0 && <div style={{ marginTop:4, fontSize:11, color:"#88A8CC" }}>現金支出 {maskY(yen(h.cashExpTotal))} / CR {maskY(yen(h.creditExpTotal||0))}</div>}
                    {h.occasionals && h.occasionals.length > 0 && (
                      <div style={{ marginTop:4, fontSize:11, color:"#88A8CC" }}>不定期: {h.occasionals.map(o=>o.name).join("・")}</div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ===== 固定支出編集 =====
  if (page === "fixed") {
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:40 }}>
        <SubHeader title="固定支出を編集" sub="SETTINGS" />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {fixed.map(f => (
              <div key={f.id} style={{ background:"#fff", borderRadius:14, padding:"14px 16px", border:"1px solid #DDE8F8", boxShadow:"0 1px 6px rgba(30,60,180,0.06)" }}>
                {editFixed===f.id ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    <input value={f.name} onChange={e=>updateFixed(f.id,"name",e.target.value)} style={{...inp,marginTop:0}} placeholder="項目名" />
                    <input type="number" value={f.amount} onChange={e=>updateFixed(f.id,"amount",e.target.value)} onFocus={e=>e.target.select()} style={{...inp,marginTop:0}} inputMode="numeric" />
                    <input value={f.day} onChange={e=>updateFixed(f.id,"day",e.target.value)} style={{...inp,marginTop:0}} placeholder="引落日" />
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={()=>{setFixed(p=>p.filter(x=>x.id!==f.id));setEditFixed(null);}} style={{ flex:1,padding:"10px",background:"#FEF0F0",border:"none",borderRadius:10,color:"#C84040",fontSize:13,cursor:"pointer" }}>削除</button>
                      <button onClick={()=>setEditFixed(null)} style={{ flex:2,padding:"10px",background:"#1C3561",border:"none",borderRadius:10,color:"#fff",fontSize:13,cursor:"pointer" }}>完了</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:600 }}>{f.name}</div>
                      <div style={{ fontSize:11, color:"#88A8CC", marginTop:2 }}>{f.day}</div>
                    </div>
                    <div style={{ fontWeight:700, fontSize:15 }}>{yen(f.amount)}</div>
                    <button onClick={()=>setEditFixed(f.id)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14 }}>✏️</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{ marginTop:16,background:"#EEF2FF",borderRadius:14,padding:"14px 16px",textAlign:"center",border:"1px solid #DDE8F8" }}>
            <span style={{ fontSize:13,color:"#4A6090" }}>固定支出合計 </span>
            <span style={{ fontSize:16,fontWeight:700 }}>{yen(fixedTotal)}</span>
          </div>
        </div>
      </div>
    );
  }

  // ===== 不定期支出マスター =====
  if (page === "occasional") {
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:40 }}>
        <SubHeader title="不定期支出" sub="OCCASIONAL" />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>
          <div style={{ fontSize:11,color:"#88A8CC",marginBottom:10,letterSpacing:"0.05em" }}>「今月＋」で当月の支出に追加できます</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {occMaster.map(o => (
              <div key={o.id} style={{ background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid #DDE8F8",boxShadow:"0 1px 6px rgba(30,60,180,0.06)" }}>
                {editOcc===o.id ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    <input value={o.name} onChange={e=>updateOccMaster(o.id,"name",e.target.value)} style={{...inp,marginTop:0}} placeholder="項目名" />
                    <input type="number" value={o.amount} onChange={e=>updateOccMaster(o.id,"amount",e.target.value)} onFocus={e=>e.target.select()} style={{...inp,marginTop:0}} inputMode="numeric" />
                    <input value={o.note} onChange={e=>updateOccMaster(o.id,"note",e.target.value)} style={{...inp,marginTop:0}} placeholder="発生時期・メモ" />
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={()=>{setOccMaster(p=>p.filter(x=>x.id!==o.id));setEditOcc(null);}} style={{ flex:1,padding:"10px",background:"#FEF0F0",border:"none",borderRadius:10,color:"#C84040",fontSize:13,cursor:"pointer" }}>削除</button>
                      <button onClick={()=>setEditOcc(null)} style={{ flex:2,padding:"10px",background:"#1C3561",border:"none",borderRadius:10,color:"#fff",fontSize:13,cursor:"pointer" }}>完了</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14,fontWeight:600 }}>{o.name}</div>
                      {o.note&&<div style={{ fontSize:11,color:"#88A8CC",marginTop:2 }}>{o.note}</div>}
                    </div>
                    <div style={{ fontWeight:700,fontSize:14,color:"#1A2840" }}>{yen(o.amount)}</div>
                    <button onClick={()=>{addToThisMonth(o);setPage("home");}} style={{ background:"#EEF4FF",border:"1px solid #B0C4F0",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:11,color:"#3B6FCC",fontWeight:700,whiteSpace:"nowrap" }}>今月＋</button>
                    <button onClick={()=>setEditOcc(o.id)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14 }}>✏️</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          <button onClick={()=>setShowAddOcc(true)} style={{ marginTop:12,width:"100%",padding:"13px",background:"transparent",border:"2px dashed #A8C0EC",borderRadius:14,color:"#3B6FCC",fontSize:14,cursor:"pointer",fontWeight:600 }}>＋ 項目を追加</button>
        </div>
        {showAddOcc&&(
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowAddOcc(false)}>
            <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
              <div style={{ fontSize:15,fontWeight:700,marginBottom:16 }}>不定期支出を登録</div>
              <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>項目名</label><input value={newOcc.name} onChange={e=>setNewOcc(o=>({...o,name:e.target.value}))} style={inp} placeholder="自動車税、オイル交換…" /></div>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>金額</label><input type="number" value={newOcc.amount} onChange={e=>setNewOcc(o=>({...o,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" /></div>
                <div><label style={{ fontSize:11,color:"#4A6090" }}>発生時期・メモ</label><input value={newOcc.note} onChange={e=>setNewOcc(o=>({...o,note:e.target.value}))} style={inp} placeholder="5月、不定期…" /></div>
              </div>
              <div style={{ display:"flex",gap:10,marginTop:20 }}>
                <button onClick={()=>setShowAddOcc(false)} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
                <button onClick={addOccMaster} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>登録</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ===== 出費管理 =====
  if (page === "expenses") {
    const sorted = [...expenses].reverse();
    const filtered = filterCat ? sorted.filter(e => e.catId === filterCat) : sorted;
    const catName = id => (expCats.find(c => c.id === id) || {name:"未分類"}).name;
    const catColor = id => {
      const idx = expCats.findIndex(c => c.id === id);
      return ["#3B70CC","#8050C8","#C04060","#2890A8","#A038B0","#2870C8","#8850C0","#4858A8"][idx] || "#5068A8";
    };
    const m2 = current.month.match(/(\d+)年(\d+)月/) || [];
    const expYear = Number(m2[1]) || new Date().getFullYear();
    const expMonthNum = Number(m2[2]) || (new Date().getMonth() + 1);
    const expMonthDays = new Date(expYear, expMonthNum, 0).getDate();
    const expDay = parseInt((newExp.date || "").split("/")[1]) || new Date().getDate();
    return (
      <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:100 }}>
        <SubHeader title="出費管理" sub="EXPENSES" />
        <div style={{ maxWidth:480, margin:"0 auto", padding:"16px" }}>

          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <div style={{ flex:1, ...card, padding:"14px", textAlign:"center" }}>
              <div style={{ fontSize:11, color:"#4A6090", marginBottom:4 }}>現金支出</div>
              <div style={{ fontSize:20, fontWeight:700, color:"#1A2840" }}>{maskY(yen(cashExpTotal))}</div>
              <div style={{ fontSize:10, color:"#88A8CC", marginTop:2 }}>残高から引く</div>
            </div>
            <div style={{ flex:1, ...card, padding:"14px", textAlign:"center" }}>
              <div style={{ fontSize:11, color:"#88A8CC", marginBottom:4 }}>クレジット</div>
              <div style={{ fontSize:20, fontWeight:700, color:"#4060A0" }}>{maskY(yen(creditExpTotal))}</div>
              <div style={{ fontSize:10, color:"#B0C0D8", marginTop:2 }}>別管理</div>
            </div>
          </div>

          <div style={{ ...card, marginBottom:12 }}>
            <div style={{ fontSize:10, color:"#88A8CC", marginBottom:8, letterSpacing:"0.08em" }}>カテゴリ（タップでフィルター・長押しで名前編集）</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {expCats.map(c => (
                editCatId === c.id ? (
                  <div key={c.id} style={{ display:"flex", gap:4, alignItems:"center" }}>
                    <input value={editCatName} onChange={e=>setEditCatName(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&saveCatName(c.id)}
                      style={{ width:72, padding:"5px 8px", border:"1px solid #B0C4F0", borderRadius:8, fontSize:12, outline:"none" }}
                      autoFocus />
                    <button onClick={()=>saveCatName(c.id)} style={{ padding:"5px 8px", background:"#1C3561", border:"none", borderRadius:8, color:"#fff", fontSize:11, cursor:"pointer" }}>完了</button>
                    <button onClick={()=>setEditCatId(null)} style={{ padding:"5px 6px", background:"#E0E8F8", border:"none", borderRadius:8, color:"#4060A0", fontSize:11, cursor:"pointer" }}>×</button>
                  </div>
                ) : (
                  <button key={c.id}
                    onClick={()=>setFilterCat(f => f===c.id ? null : c.id)}
                    onContextMenu={e=>{e.preventDefault();setEditCatId(c.id);setEditCatName(c.name);}}
                    onPointerDown={e=>{
                      const t = setTimeout(()=>{setEditCatId(c.id);setEditCatName(c.name);},600);
                      e.currentTarget._lt=t;
                    }}
                    onPointerUp={e=>clearTimeout(e.currentTarget._lt)}
                    onPointerLeave={e=>clearTimeout(e.currentTarget._lt)}
                    style={{
                      padding:"5px 12px", border:"none", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600,
                      background: filterCat===c.id ? catColor(c.id) : "#EEF2FF",
                      color: filterCat===c.id ? "#fff" : "#3A5CA8",
                      transition:"background 0.15s"
                    }}>{c.name}</button>
                )
              ))}
              {filterCat && (
                <button onClick={()=>setFilterCat(null)} style={{ padding:"5px 10px", border:"none", borderRadius:20, fontSize:11, cursor:"pointer", background:"#FEF0F0", color:"#C84040" }}>✕ 解除</button>
              )}
              {showAddCat ? (
                <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                  <input value={newCatName} onChange={e=>setNewCatName(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addCat()}
                    style={{ width:80, padding:"5px 8px", border:"1px solid #B0C4F0", borderRadius:8, fontSize:12, outline:"none" }}
                    autoFocus />
                  <button onClick={addCat} style={{ padding:"5px 8px", background:"#1C3561", border:"none", borderRadius:8, color:"#fff", fontSize:11, cursor:"pointer" }}>完了</button>
                  <button onClick={()=>{setShowAddCat(false);setNewCatName("");}} style={{ padding:"5px 6px", background:"#E0E8F8", border:"none", borderRadius:8, color:"#4060A0", fontSize:11, cursor:"pointer" }}>×</button>
                </div>
              ) : (
                <button onClick={()=>setShowAddCat(true)} style={{ padding:"5px 10px", border:"1px dashed #A8C0EC", borderRadius:20, fontSize:12, cursor:"pointer", background:"transparent", color:"#3B6FCC", fontWeight:600 }}>＋</button>
              )}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div style={{ ...card, padding:"32px 16px", textAlign:"center", color:"#88A8CC", fontSize:14 }}>まだ出費がありません</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {filtered.map(e => (
                <div key={e.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", display:"flex", alignItems:"center", gap:8, boxShadow:"0 1px 6px rgba(30,60,180,0.06)", border:"1px solid #DDE8F8" }}>
                  <div style={{ fontSize:12, color:"#88A8CC", minWidth:32, flexShrink:0 }}>{e.date}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14 }}>{e.name}</div>
                    <div style={{ fontSize:10, marginTop:2, color: catColor(e.catId), fontWeight:600 }}>{catName(e.catId)}</div>
                  </div>
                  <div style={{ fontWeight:700, fontSize:14, flexShrink:0 }}>{maskY(yen(e.amount))}</div>
                  <div style={{
                    fontSize:10, padding:"3px 8px", borderRadius:10, flexShrink:0,
                    background: e.type==="cash" ? "#EEF2FF" : "#E8EEF8",
                    color: e.type==="cash" ? "#3A5CA8" : "#4060A0",
                    fontWeight:600
                  }}>{e.type==="cash" ? "現金" : "CR"}</div>
                  <button onClick={()=>deleteExpense(e.id)} style={{ background:"#FEF0F0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,color:"#C84040",flexShrink:0 }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{ position:"fixed", bottom:0, left:0, right:0, padding:"12px 16px 28px", background:"#EEF3FF", borderTop:"1px solid #DDE8F8", maxWidth:480, margin:"0 auto" }}>
          <button onClick={()=>setShowAddExp(true)} style={{ width:"100%", padding:"14px", background:"linear-gradient(135deg, #1C3561, #2A4890)", border:"none", borderRadius:14, color:"#BCD8FF", fontSize:14, cursor:"pointer", fontWeight:600 }}>＋ 出費を追加</button>
        </div>

        {showAddExp&&(
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowAddExp(false)}>
            <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
              <div style={{ fontSize:15,fontWeight:700,marginBottom:16 }}>出費を追加</div>
              <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                <div>
                  <label style={{ fontSize:11,color:"#4A6090" }}>使ったもの</label>
                  <input value={newExp.name} onChange={e=>setNewExp(x=>({...x,name:e.target.value}))} style={inp} placeholder="コンビニ、ランチ…" />
                </div>
                <div>
                  <label style={{ fontSize:11,color:"#4A6090",display:"block",marginBottom:4 }}>日付</label>
                  <DayPicker day={expDay} maxDay={expMonthDays} monthNum={expMonthNum}
                    onChange={d => setNewExp(x => ({...x,date:`${expMonthNum}/${d}`}))} />
                </div>
                <div>
                  <label style={{ fontSize:11,color:"#4A6090" }}>金額</label>
                  <input type="number" value={newExp.amount} onChange={e=>setNewExp(x=>({...x,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" />
                </div>
                <div>
                  <label style={{ fontSize:11,color:"#4A6090",display:"block",marginBottom:8 }}>カテゴリ</label>
                  <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                    {expCats.map(c => (
                      <button key={c.id} onClick={()=>setNewExp(x=>({...x,catId:c.id}))} style={{
                        padding:"8px 14px",border:"none",borderRadius:20,fontSize:13,cursor:"pointer",fontWeight:600,
                        background: newExp.catId===c.id ? catColor(c.id) : "#E8EFF8",
                        color: newExp.catId===c.id ? "#fff" : "#3A5CA8",
                      }}>{c.name}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{ fontSize:11,color:"#4A6090",display:"block",marginBottom:8 }}>支払い方法</label>
                  <div style={{ display:"flex",gap:8 }}>
                    <button onClick={()=>setNewExp(x=>({...x,type:"cash"}))} style={{
                      flex:1,padding:"13px",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",fontWeight:600,
                      background:newExp.type==="cash"?"#1C3561":"#E0E8F8",
                      color:newExp.type==="cash"?"#BCD8FF":"#4060A0"
                    }}>現金</button>
                    <button onClick={()=>setNewExp(x=>({...x,type:"credit"}))} style={{
                      flex:1,padding:"13px",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",fontWeight:600,
                      background:newExp.type==="credit"?"#2A3880":"#E0E8F8",
                      color:newExp.type==="credit"?"#C0D0F8":"#4060A0"
                    }}>クレジット</button>
                  </div>
                </div>
              </div>
              <div style={{ display:"flex",gap:10,marginTop:20 }}>
                <button onClick={()=>setShowAddExp(false)} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
                <button onClick={addExpense} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>追加</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ===== ホーム =====
  return (
    <div style={{ minHeight:"100vh", background:"#EEF3FF", paddingBottom:80 }}>
      <div style={{ background:"linear-gradient(160deg, #1C3561 0%, #2A4890 100%)",color:"#F0F5FF",padding:"16px 20px 18px",paddingTop:"max(env(safe-area-inset-top),16px)",position:"sticky",top:0,zIndex:100 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14 }}>
          <div>
            <div style={{ fontSize:10,letterSpacing:"0.15em",color:"#7AAAE0",marginBottom:2 }}>HOUSEHOLD BUDGET</div>
            <div style={{ fontSize:22,fontWeight:700 }}>{current.month}</div>
          </div>
          <div style={{ display:"flex",gap:5,justifyContent:"flex-end" }}>
            <NavBtn label="履歴"   onClick={()=>setPage("history")} />
            <NavBtn label="固定"   onClick={()=>setPage("fixed")} />
            <NavBtn label="不定期" onClick={()=>setPage("occasional")} />
            <NavBtn label="出費"   onClick={()=>setPage("expenses")} />
            <NavBtn label="データ" onClick={()=>setShowData(true)} />
          </div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.10)",borderRadius:16,padding:"16px",border:"1px solid rgba(255,255,255,0.15)" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
            <div style={{ fontSize:11,color:"#90B8F0" }}>今月の残り</div>
            <button onClick={()=>setHideNums(h=>!h)} style={{ background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#90B8F0",cursor:"pointer",letterSpacing:"0.05em" }}>{hideNums?"表示":"隠す"}</button>
          </div>
          <div style={{ fontSize:34,fontWeight:700,color:hideNums?"#90B8F0":"#fff",letterSpacing:"-0.02em" }}>{maskY(yen(balance))}</div>
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:8 }}>
            <span>収入 {maskY(yen(income))}</span>
            <span>支出 {maskY(yen(totalOut))}</span>
          </div>
          <div style={{ marginTop:10,background:"rgba(0,0,0,0.25)",borderRadius:4,height:5,overflow:"hidden" }}>
            <div style={{ height:"100%",borderRadius:4,width:income>0?`${Math.min((totalOut/income)*100,100)}%`:"0%",background:totalOut/income>0.9?"#C84040":totalOut/income>0.7?"#D4901A":"#60A8F0",transition:"width 0.4s ease" }} />
          </div>
        </div>
      </div>

      <div style={{ maxWidth:480,margin:"0 auto",padding:"0 16px" }}>
        <div style={{ marginTop:20,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:4 }}>今月の手取り</div>
          {hideNums
            ? <div style={{...inp,marginTop:0,fontSize:20,fontWeight:700,color:"#B0C0D8",display:"flex",alignItems:"center"}}>¥----</div>
            : <input type="number" value={current.income} onChange={e=>setCurrent(c=>({...c,income:e.target.value}))} onFocus={e=>e.target.select()} style={{...inp,marginTop:0,fontSize:20,fontWeight:700}} inputMode="numeric" />
          }
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:12 }}>変動支出</div>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {varItems.map(v => (
              <div key={v.id}>
                {editVarId===v.id ? (
                  <div style={{ display:"flex",gap:6,marginBottom:4 }}>
                    <input value={editVarName} onChange={e=>setEditVarName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveVarName(v.id)}
                      style={{ flex:1,padding:"7px 10px",background:"#fff",border:"1px solid #C5D5EE",borderRadius:8,fontSize:13,color:"#1A2840",outline:"none" }} />
                    <button onClick={()=>saveVarName(v.id)} style={{ padding:"7px 12px",background:"#1C3561",border:"none",borderRadius:8,color:"#fff",fontSize:12,cursor:"pointer" }}>完了</button>
                    <button onClick={()=>deleteVarItem(v.id)} style={{ padding:"7px 10px",background:"#FEF0F0",border:"none",borderRadius:8,color:"#C84040",fontSize:12,cursor:"pointer" }}>削除</button>
                  </div>
                ) : (
                  <div style={{ display:"flex",alignItems:"center",gap:4,marginBottom:3 }}>
                    <label style={{ fontSize:12,color:"#4A6090",flex:1 }}>{v.name}</label>
                    <button onClick={()=>{setEditVarId(v.id);setEditVarName(v.name);}} style={{ background:"#EEF2FF",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12 }}>✏️</button>
                    <button onClick={()=>deleteVarItem(v.id)} style={{ background:"#FEF0F0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:13,color:"#C84040",fontWeight:700 }}>×</button>
                  </div>
                )}
                <input type="number" value={v.amount} onChange={e=>updateVarAmount(v.id,e.target.value)} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" />
              </div>
            ))}
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:12,color:isEvenMonth?"#4A6090":"#A0B0C8" }}>NHK（¥3,900）</div>
                {!isEvenMonth&&<div style={{ fontSize:10,color:"#A0B8CC",marginTop:1 }}>偶数月のみ</div>}
              </div>
              <button onClick={()=>isEvenMonth&&setCurrent(c=>({...c,nhk:!c.nhk}))}
                style={{ background:!isEvenMonth?"#C8D4E8":current.nhk?"#3B6FCC":"#D0DCF0",border:"none",borderRadius:20,width:48,height:26,cursor:isEvenMonth?"pointer":"default",position:"relative",transition:"background 0.2s",opacity:isEvenMonth?1:0.5 }}>
                <div style={{ position:"absolute",top:3,borderRadius:"50%",width:20,height:20,background:"#fff",left:(isEvenMonth&&current.nhk)?25:3,transition:"left 0.2s" }} />
              </button>
            </div>
            {showAddVar ? (
              <div style={{ display:"flex",gap:6 }}>
                <input value={newVarName} onChange={e=>setNewVarName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addVarItem()}
                  style={{ flex:1,padding:"9px 12px",background:"#fff",border:"1px solid #B0C4F0",borderRadius:8,fontSize:13,color:"#1A2840",outline:"none" }}
                  placeholder="項目名" autoFocus />
                <button onClick={addVarItem} style={{ padding:"9px 14px",background:"#1C3561",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:600 }}>追加</button>
                <button onClick={()=>{setShowAddVar(false);setNewVarName("");}} style={{ padding:"9px 10px",background:"#E0E8F8",border:"none",borderRadius:8,color:"#4060A0",fontSize:13,cursor:"pointer" }}>×</button>
              </div>
            ) : (
              <button onClick={()=>setShowAddVar(true)} style={{ padding:"9px",width:"100%",background:"transparent",border:"1.5px dashed #A8C0EC",borderRadius:8,color:"#3B6FCC",fontSize:12,cursor:"pointer" }}>＋ 項目を追加</button>
            )}
          </div>
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>固定支出合計</div>
            <div style={{ fontSize:16,fontWeight:700 }}>{maskY(yen(fixedTotal))}</div>
          </div>
          <div style={{ marginTop:10,display:"flex",flexWrap:"wrap",gap:6 }}>
            {fixed.map(f=>(
              <div key={f.id} style={{ background:"#EEF2FF",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#3A5CA8" }}>{f.name} {maskY(yen(f.amount))}</div>
            ))}
          </div>
        </div>

        <div style={{ marginTop:12,...card }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:(current.occasionals||[]).length>0?10:0 }}>
            <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>
              不定期支出 {occTotal>0&&<span style={{ fontWeight:700,color:"#1A2840" }}>合計 {maskY(yen(occTotal))}</span>}
            </div>
            <button onClick={()=>setShowOcc(true)} style={{ background:"#EEF2FF",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,color:"#3B6FCC",cursor:"pointer",fontWeight:600 }}>＋追加</button>
          </div>
          {(current.occasionals||[]).map(o=>(
            <div key={o.id} style={{ display:"flex",alignItems:"center",gap:8,marginTop:8 }}>
              <span style={{ flex:1,fontSize:13 }}>{o.name}</span>
              <span style={{ fontWeight:600,fontSize:13 }}>{maskY(yen(o.amount))}</span>
              <button onClick={()=>setCurrent(c=>({...c,occasionals:c.occasionals.filter(x=>x.id!==o.id)}))} style={{ background:"#FEF0F0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,color:"#C84040" }}>×</button>
            </div>
          ))}
        </div>

        {(cashExpTotal > 0 || creditExpTotal > 0) && (
          <div style={{ marginTop:12,...card, padding:"14px 16px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
              <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em" }}>出費</div>
              <button onClick={()=>setPage("expenses")} style={{ fontSize:11,color:"#3B6FCC",background:"none",border:"none",cursor:"pointer" }}>一覧 →</button>
            </div>
            <div style={{ display:"flex",gap:12 }}>
              {cashExpTotal>0&&<div style={{ fontSize:13 }}>現金 <span style={{ fontWeight:700 }}>{maskY(yen(cashExpTotal))}</span></div>}
              {creditExpTotal>0&&<div style={{ fontSize:13,color:"#4060A0" }}>CR <span style={{ fontWeight:700 }}>{maskY(yen(creditExpTotal))}</span><span style={{ fontSize:10,color:"#88A8CC",marginLeft:4 }}>別管理</span></div>}
            </div>
          </div>
        )}

        <div style={{ marginTop:12,...card }}>
          <div style={{ fontSize:11,color:"#4A6090",letterSpacing:"0.1em",marginBottom:10 }}>支出内訳</div>
          {[
            { label:"固定支出",   val:fixedTotal },
            ...varItems.filter(v=>(Number(v.amount)||0)>0).map(v=>({ label:v.name, val:Number(v.amount)||0 })),
            { label:"NHK",        val:nhkVal },
            { label:"不定期支出", val:occTotal },
            { label:"現金支出",   val:cashExpTotal },
          ].filter(r=>r.val>0).map((r,i)=>(
            <div key={i} style={{ display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:"1px solid #EEF3FF" }}>
              <span style={{ color:"#5070A0" }}>{r.label}</span>
              <span style={{ fontWeight:600 }}>{maskY(yen(r.val))}</span>
            </div>
          ))}
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,paddingTop:10,marginTop:4 }}>
            <span>合計</span><span>{maskY(yen(totalOut))}</span>
          </div>
          {creditExpTotal>0&&(
            <div style={{ marginTop:8,paddingTop:8,borderTop:"1px dashed #DDE8F8",display:"flex",justifyContent:"space-between",fontSize:12,color:"#4060A0" }}>
              <span>クレジット利用（別管理）</span>
              <span style={{ fontWeight:600 }}>{maskY(yen(creditExpTotal))}</span>
            </div>
          )}
        </div>

        <button onClick={()=>setShowClose(true)} style={{ marginTop:16,width:"100%",padding:"15px",background:"linear-gradient(135deg, #1C3561, #2A4890)",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,letterSpacing:"0.05em" }}>今月を締める →</button>
      </div>

      {showOcc&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowOcc(false)}>
          <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:16 }}>不定期支出を追加</div>
            {occMaster.length>0&&(
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:11,color:"#4A6090",marginBottom:8 }}>リストから選ぶ</div>
                <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                  {occMaster.map(m=>(<button key={m.id} onClick={()=>{addToThisMonth(m);setShowOcc(false);}} style={{ background:"#EEF4FF",border:"1px solid #B0C4F0",borderRadius:8,padding:"5px 10px",fontSize:12,color:"#3B6FCC",cursor:"pointer" }}>{m.name}　{yen(m.amount)}</button>))}
                </div>
                <div style={{ fontSize:11,color:"#88A8CC",margin:"12px 0 8px" }}>または手入力</div>
              </div>
            )}
            <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
              <div><label style={{ fontSize:11,color:"#4A6090" }}>項目名</label><input value={occInput.name} onChange={e=>setOccInput(o=>({...o,name:e.target.value}))} style={inp} placeholder="自動車税、奨学金…" /></div>
              <div><label style={{ fontSize:11,color:"#4A6090" }}>金額</label><input type="number" value={occInput.amount} onChange={e=>setOccInput(o=>({...o,amount:e.target.value}))} onFocus={e=>e.target.select()} style={inp} inputMode="numeric" placeholder="0" /></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button onClick={()=>setShowOcc(false)} style={{ flex:1,padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>キャンセル</button>
              <button onClick={addOccasional} style={{ flex:2,padding:"13px",background:"#1C3561",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>追加</button>
            </div>
          </div>
        </div>
      )}

      {showClose&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center" }}>
          <div style={{ background:"#fff",borderRadius:20,padding:"28px 24px",maxWidth:320,width:"90%",boxShadow:"0 8px 32px rgba(30,60,180,0.18)" }}>
            <div style={{ fontSize:16,fontWeight:700,marginBottom:6 }}>今月を締めますか？</div>
            <div style={{ background:"#EEF3FF",borderRadius:14,padding:"14px",margin:"16px 0",border:"1px solid #DDE8F8" }}>
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6 }}><span style={{ color:"#5070A0" }}>手取り</span><span style={{ fontWeight:600 }}>{yen(income)}</span></div>
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6 }}><span style={{ color:"#5070A0" }}>支出合計</span><span style={{ fontWeight:600 }}>{yen(totalOut)}</span></div>
              {creditExpTotal>0&&<div style={{ display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,color:"#4060A0" }}><span>CR利用（別）</span><span>{yen(creditExpTotal)}</span></div>}
              <div style={{ display:"flex",justifyContent:"space-between",fontSize:15,borderTop:"1px solid #C5D5EE",paddingTop:8,marginTop:4 }}><span style={{ color:"#5070A0" }}>残り</span><span style={{ fontWeight:700,color:balColor }}>{yen(balance)}</span></div>
            </div>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setShowClose(false)} style={{ flex:1,padding:"12px",background:"#EEF2FF",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#4060A0" }}>やめる</button>
              <button onClick={closeMonth} style={{ flex:2,padding:"12px",background:"#1C3561",border:"none",borderRadius:10,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>締める</button>
            </div>
          </div>
        </div>
      )}

      {showData&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end" }} onClick={e=>e.target===e.currentTarget&&setShowData(false)}>
          <div style={{ background:"#F5F9FF",borderRadius:"20px 20px 0 0",padding:"28px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto" }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:6 }}>データ管理</div>
            <div style={{ fontSize:12,color:"#88A8CC",marginBottom:20 }}>全データ（固定支出・履歴・当月・不定期マスター）を対象とします</div>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              <button onClick={exportData} style={{ padding:"15px",background:"#1C3561",border:"none",borderRadius:14,color:"#BCD8FF",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📤</span>書き出し（JSONダウンロード）
              </button>
              <button onClick={()=>importRef.current.click()} style={{ padding:"15px",background:"#EEF4FF",border:"2px solid #B0C4F0",borderRadius:14,color:"#1C3561",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left" }}>
                <span style={{ fontSize:18,marginRight:10 }}>📥</span>読み込み（JSONを選択）
              </button>
              <input ref={importRef} type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
            </div>
            <button onClick={()=>setShowData(false)} style={{ marginTop:16,width:"100%",padding:"13px",background:"#E0E8F8",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",color:"#4060A0" }}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
