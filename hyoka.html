  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #05060f;
      --bg2: #0b0e22;
      --bg3: #11163a;
      --accent: #00e5ff;      /* neon cyan */
      --accent2: #ff3df0;     /* neon magenta */
      --neon-cyan: #00e5ff;
      --neon-pink: #ff3df0;
      --neon-purple: #b16bff;
      --moon: #eef3ff;
      --text: #e6ecff;
      --text2: #8a93c4;
      --border: #232a5c;
      --red: #ff4d6d;
      --gold: #ffd166;
    }

    body {
      background:
        radial-gradient(circle at 78% 12%, rgba(238,243,255,0.18) 0%, rgba(238,243,255,0.05) 7%, rgba(5,6,15,0) 16%),
        radial-gradient(circle at 78% 12%, rgba(177,107,255,0.10) 0%, rgba(5,6,15,0) 30%),
        radial-gradient(ellipse at 50% 120%, rgba(255,61,240,0.10) 0%, rgba(5,6,15,0) 55%),
        radial-gradient(ellipse at 0% 0%, rgba(0,229,255,0.08) 0%, rgba(5,6,15,0) 45%),
        var(--bg);
      background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* glowing moon, top-right of the night sky */
    body::before {
      content: '';
      position: fixed;
      top: -40px; right: -30px;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #ffffff 0%, var(--moon) 45%, #c9d4ff 70%, #aab6ee 100%);
      box-shadow: 0 0 60px 12px rgba(200,214,255,0.45), inset -16px -12px 28px rgba(120,140,210,0.55);
      opacity: 0.9;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== PIN SCREEN ===== */
    #pin-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .pin-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: 0.15em;
      margin-bottom: 0.4rem;
    }

    .pin-subtitle {
      color: var(--text2);
      font-size: 0.85rem;
      margin-bottom: 2.8rem;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
      margin-bottom: 2.5rem;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      transition: all 0.2s;
    }

    .pin-dot.filled {
      background: var(--accent2);
      border-color: var(--accent2);
      box-shadow: 0 0 14px var(--accent2);
    }

    .pin-dot.error {
      border-color: var(--red);
      background: var(--red);
      box-shadow: 0 0 14px var(--red);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 76px);
      gap: 14px;
    }

    .pin-key {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      user-select: none;
    }

    .pin-key:active { background: var(--accent); transform: scale(0.9); }
    .pin-key.del { font-size: 1.3rem; color: var(--text2); }
    .pin-key.empty { border: none; background: transparent; cursor: default; pointer-events: none; }

    /* ===== MAIN APP ===== */
    #app { display: none; min-height: 100vh; }

    .header {
      position: sticky;
      top: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: 0.08em;
    }

    .add-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    }

    .add-btn:active { transform: scale(0.88); }

    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }

    .cat-tab {
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .cat-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .sort-bar {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .sort-bar::-webkit-scrollbar { display: none; }

    .sort-label { font-size: 0.72rem; color: var(--text2); white-space: nowrap; flex-shrink: 0; }

    .sort-btn {
      padding: 4px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      font-size: 0.76rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .sort-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(168,85,247,0.1); }

    .entry-list { padding: 10px 16px 100px; }

    .entry-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .entry-card:active { transform: scale(0.98); border-color: var(--accent); }

    .entry-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .entry-store { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
    .entry-cast { font-size: 0.82rem; color: var(--accent2); }

    .entry-meta { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .entry-date { font-size: 0.72rem; color: var(--text2); margin-bottom: 2px; }
    .entry-amount { font-size: 0.88rem; color: var(--gold); font-weight: 600; }

    .entry-cat-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .cat-deli  { background: #1a3050; color: #60a5fa; }
    .cat-soap  { background: #341a48; color: #c084fc; }
    .cat-hako  { background: #1a3326; color: #4ade80; }

    .entry-ratings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 10px;
      margin-top: 8px;
    }

    .mini-rating { display: flex; align-items: center; gap: 6px; }
    .mini-rating-label { color: var(--text2); font-size: 0.72rem; width: 42px; flex-shrink: 0; }
    .mini-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#7c3aed,#a855f7); }
    .mini-score { color: var(--text2); font-size: 0.7rem; width: 22px; text-align: right; }

    .entry-dist { font-size: 0.72rem; color: var(--text2); margin-top: 7px; }

    .empty-state { text-align: center; padding: 70px 20px; color: var(--text2); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-text { font-size: 0.9rem; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.open { display: flex; }

    .modal-sheet {
      background: var(--bg2);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 0 16px 48px;
      animation: slideUp 0.28s cubic-bezier(.4,0,.2,1);
      scrollbar-width: none;
    }
    .modal-sheet::-webkit-scrollbar { display: none; }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-handle {
      width: 38px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 18px;
    }

    .modal-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    /* ===== FORM ===== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 6px; }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;

<!-- PIN SCREEN -->
<div id="pin-screen">

</div>

<div id="app">

<script>
// ===== PIN =====
function getPin() { return localStorage.getItem('hyoka_pin_v1') || '4062'; }
let pinBuf = '';

function pinPress(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d;
  refreshDots();
  if (pinBuf.length === 4) setTimeout(checkPin, 180);
}

function pinDel() {
  pinBuf = pinBuf.slice(0, -1);
  refreshDots();
}

function refreshDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd' + i);
    d.classList.remove('filled', 'error');
    if (i < pinBuf.length) d.classList.add('filled');
  }
}

function checkPin() {
  if (pinBuf === getPin()) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('pd' + i);
      d.classList.remove('filled');
      d.classList.add('error');
    }
    setTimeout(() => { pinBuf = ''; refreshDots(); }, 700);
  }
}

// ===== STORAGE =====
const KEY = 'hyoka_v1';
function load() { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ===== CATEGORIES =====
const CKEY = 'hyoka_cats_v1';
// ===== STORE LOCATION DB (ソープ・ハコのみ) =====
const LOC_CATS = ['ソープ', 'ハコ'];
const SLKEY = 'hyoka_store_locs_v1';
function loadStoreLocs() { try { return JSON.parse(localStorage.getItem(SLKEY) || '{}'); } catch(e) { return {}; } }
function saveStoreLocs(m) { localStorage.setItem(SLKEY, JSON.stringify(m)); }
function getStoreLoc(name) { return loadStoreLocs()[name] || null; }
function setStoreLoc(name, lat, lng) {
  const m = loadStoreLocs();
  m[name] = { lat: lat, lng: lng };
  saveStoreLocs(m);
}
function isLocCat(cat) { return LOC_CATS.includes(cat || formCat); }

const SMKEY = 'hyoka_store_memo_v1';
const CRKEY = 'hyoka_cast_ratings_v1';
function loadCastRatings() { try { return JSON.parse(localStorage.getItem(CRKEY) || '{}'); } catch(e) { return {}; } }
function saveCastRatings(r) { localStorage.setItem(CRKEY, JSON.stringify(r)); }
function getCastRating(castKey) {
  return loadCastRatings()[castKey] || { appearance:50, friendliness:50, technique:50, atmosphere:50, talk:50 };
}
function setCastRating(castKey, ratings) {
  var r = loadCastRatings();
  r[castKey] = ratings;
  saveCastRatings(r);
}
function loadStoreMemos() { try { return JSON.parse(localStorage.getItem(SMKEY) || '{}'); } catch(e) { return {}; } }
function saveStoreMemos(m) { localStorage.setItem(SMKEY, JSON.stringify(m)); }
function getStoreMemo(name) { return loadStoreMemos()[name] || ''; }
function setStoreMemo(name, text) {
  const m = loadStoreMemos();
  if (text) m[name] = text; else delete m[name];
  saveStoreMemos(m);
}

// Apply saved store location to the form (if exists)
function applyStoreLoc(name) {
  if (!isLocCat()) return;
  const loc = getStoreLoc(name);
  if (loc) { setGPS(loc.lat, loc.lng); showLocHint('この店舗の保存済み場所を読み込みました'); }
  else { showLocHint(''); }
}
function showLocHint(msg) {
  let h = document.getElementById('store-loc-hint');
  if (!h) return;
  h.textContent = msg;
  h.style.display = msg ? 'block' : 'none';
}

const DEFAULT_CATS = [
  { name: 'デリ',   color: '#60a5fa' },
  { name: 'ソープ', color: '#c084fc' },
  { name: 'ハコ',   color: '#4ade80' }
];
function loadCats() {
  try {
    const c = JSON.parse(localStorage.getItem(CKEY));
    if (Array.isArray(c) && c.length) return c;
  } catch (e) {}
  return DEFAULT_CATS.slice();
}
function saveCats(c) { localStorage.setItem(CKEY, JSON.stringify(c)); }
function catColor(name) {
  const c = loadCats().find(x => x.name === name);
  return c ? c.color : '#8a93c4';
}
function hexToRgba(hex, a) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
  if (!m) return 'rgba(138,147,196,' + a + ')';
  return 'rgba(' + parseInt(m[1],16) + ',' + parseInt(m[2],16) + ',' + parseInt(m[3],16) + ',' + a + ')';
}

function renderCatTabs() {
  const el = document.getElementById('category-tabs');
  let html = '<button class="cat-tab' + (currentCat === 'all' ? ' active' : '') + '" data-cat="all" onclick="filterCatName(this,\'all\')">すべて</button>';
  loadCats().forEach(c => {
    const active = currentCat === c.name;
    const style = active
      ? 'background:' + hexToRgba(c.color,0.18) + ';border-color:' + c.color + ';color:' + c.color + ';box-shadow:0 0 12px ' + hexToRgba(c.color,0.5) + ';text-shadow:0 0 6px ' + c.color + ';'
      : '';
    html += '<button class="cat-tab' + (active ? ' active' : '') + '" data-cat="' + esc(c.name) + '" style="' + style + '" onclick="filterCatName(this,\'' + esc(c.name) + '\')">' + esc(c.name) + '</button>';
  });
  el.innerHTML = html;
}

function renderCatSelect() {
  const el = document.getElementById('cat-select-row');
  el.innerHTML = loadCats().map(c => {
    const sel = formCat === c.name;
    const style = sel
      ? 'background:' + hexToRgba(c.color,0.18) + ';border-color:' + c.color + ';color:' + c.color + ';'
      : '';
    return '<button class="cat-select-btn" data-cat="' + esc(c.name) + '" style="' + style + '" onclick="selectCat(\'' + esc(c.name) + '\')">' + esc(c.name) + '</button>';
  }).join('');
}

// filterCat by name (re-renders tabs to update active highlight)
function filterCatName(btn, cat) {
  currentCat = cat;
  renderCatTabs();
  if (currentView === 'casts') renderCasts();
  else if (currentView === 'stores') renderStores();
  else if (currentView === 'stats') renderStats();
  else renderList();
}


// ===== GPS =====
let myGPS = null;
let formGPS = null;

function initApp() {
  renderCatTabs();
  switchView(currentView);
}

function locateMe() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => { myGPS = { lat: p.coords.latitude, lng: p.coords.longitude }; if (currentView === 'records') renderList(); },
    () => {}
  );
}

function toggleLocationPanel() {
  const panel = document.getElementById('location-panel');
  const chev = document.getElementById('location-chevron');
  const isOpen = panel.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

function setGPS(lat, lng) {
  formGPS = { lat: lat, lng: lng };
  const txt = lat.toFixed(5) + ', ' + lng.toFixed(5);
  const s = document.getElementById('gps-status');
  const si = document.getElementById('gps-status-inline');
  if (s) s.textContent = txt;
  if (si) si.textContent = txt;
  const fc = document.getElementById('f-coords');
  if (fc) fc.value = txt;
}

function applyManualCoords() {
  const raw = (document.getElementById('f-coords').value || '').trim();
  const m = raw.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (!m) { alert('座標の形式が正しくありません\n例：35.68950, 139.69171'); return; }
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    alert('範囲外の値です（緯度 -90〜90、経度 -180〜180）');
    return;
  }
  setGPS(lat, lng);
}

function clearGPS() {
  formGPS = null;
  const s = document.getElementById('gps-status');
  const si = document.getElementById('gps-status-inline');
  if (s) s.textContent = '未記録';
  if (si) si.textContent = '未記録';
  const fc = document.getElementById('f-coords');
  if (fc) fc.value = '';
}

function recordGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-status').textContent = '非対応';
    return;
  }
  document.getElementById('gps-status').textContent = '取得中...';
  navigator.geolocation.getCurrentPosition(
    p => { setGPS(p.coords.latitude, p.coords.longitude); },
    () => { document.getElementById('gps-status').textContent = '取得に失敗しました'; }
  );
}

function haversine(a, b) {
  if (!a || !b) return Infinity;
  const R = 6371000, r = Math.PI/180;
  const dLat = (b.lat - a.lat) * r;
  const dLng = (b.lng - a.lng) * r;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function fmtDist(m) {
  if (m === Infinity) return null;
  return m < 1000 ? Math.round(m) + 'm' : (m/1000).toFixed(1) + 'km';
}

// ===== STATE =====
let currentCat  = 'all';
let currentSort = 'date';
let editId  = null;
let viewId  = null;
let formCat = '';

// ===== RENDER LIST =====
function renderList() {
  let list = load();
  if (currentCat !== 'all') list = list.filter(e => e.category === currentCat);
  if (currentSearch) {
    list = list.filter(function(e) {
      const q = currentSearch;
      return toHira((e.castName||'').toLowerCase()).includes(q)
          || toHira((e.storeName||'').toLowerCase()).includes(q)
          || toHira((e.memo||'').toLowerCase()).includes(q)
          || toHira((e.episode||'').toLowerCase()).includes(q);
    });
  }
  list = sortList(list);

  const el = document.getElementById('entry-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">記録がありません<br>＋ ボタンから追加してください</div></div>';
    return;
  }

  el.innerHTML = list.map(e => {
    const dist = e.gps ? fmtDist(haversine(myGPS, e.gps)) : null;
    const col = catColor(e.category);
    return `
      <div class="entry-card${e.favorite ? ' fav-card' : ''}" onclick="openDetail('${e.id}')">
        <span class="entry-cat-badge" style="background:${hexToRgba(col,0.16)};color:${col};box-shadow:0 0 8px ${hexToRgba(col,0.4)}">${esc(e.category)}</span>

function catClass(cat) {
  return cat === 'デリ' ? 'cat-deli' : cat === 'ソープ' ? 'cat-soap' : 'cat-hako';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortList(list) {
  return [...list].sort((a,b) => {
    switch(currentSort) {
      case 'date':         return (b.date||'').localeCompare(a.date||'');
      case 'amount':       return (b.amount||0) - (a.amount||0);
      case 'dist':         return haversine(myGPS,a.gps) - haversine(myGPS,b.gps);
      case 'appearance':   return b.ratings.appearance   - a.ratings.appearance;
      case 'friendliness': return b.ratings.friendliness - a.ratings.friendliness;
      case 'technique':    return b.ratings.technique    - a.ratings.technique;
      case 'atmosphere':   return b.ratings.atmosphere   - a.ratings.atmosphere;
      case 'talk':         return (b.ratings.talk||0)        - (a.ratings.talk||0);
      case 'fav':          return (b.favorite?1:0) - (a.favorite?1:0);
      default: return 0;
    }
  });
}

let currentView = 'casts';
let currentCastSort = 'lastDate';
let castSortDir = 'desc';
function toHira(str) {
  return (str||'').replace(/[ァ-ヶ]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0) - 0x60);
  });
}
let currentSearch = '';


function toggleSearch() {

function switchView(view) {

  else if (view === 'stores') renderStores();

function aggregateCasts() {
  const entries = load();
  const map = {};
  entries.forEach(e => {
    if (currentCat !== 'all' && e.category !== currentCat) return;
    const key = e.castName + '|' + e.storeName;
    if (!map[key]) {
      map[key] = {
        castName: e.castName,
        storeName: e.storeName,
        category: e.category,
        count: 0,
        lastDate: '',
        totalAmount: 0,
        kissCount: 0
      };
    }
    const c = map[key];
    c.count++;
    if (!c.lastDate || e.date > c.lastDate) c.lastDate = e.date;
    c.totalAmount += (parseInt(e.amount) || 0);
    if (e.kiss) c.kissCount++;
  });
  return Object.values(map).map(function(c) {
    var castKey = (c.castName||'') + '|' + (c.storeName||'');
    var cr = getCastRating(castKey);
    return Object.assign(c, {
      avgAppearance: cr.appearance,
      avgFriendliness: cr.friendliness,
      avgTechnique: cr.technique,
      avgAtmosphere: cr.atmosphere,
      avgTalk: cr.talk,
      favorite: cr.favorite || false
    });
  });
}

function sortCasts(casts) {
  return casts.sort((a, b) => {
    switch (currentCastSort) {
      case 'lastDate':    return castSortDir === 'desc'
        ? b.lastDate.localeCompare(a.lastDate)
        : a.lastDate.localeCompare(b.lastDate);
      case 'count':       return b.count - a.count;
      case 'totalAmount': return b.totalAmount - a.totalAmount;
      case 'talk':        return b.avgTalk - a.avgTalk;
      case 'fav':          return (b.favorite?1:0) - (a.favorite?1:0);
      default: return 0;
    }
  });
}

function setCastSort(btn, sort) {
  if (currentCastSort === sort && sort === 'lastDate') {
    castSortDir = castSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    castSortDir = 'desc';
    var ldBtn = document.querySelector('[data-csort="lastDate"]');
    if (ldBtn) ldBtn.textContent = '最終指名日';
  }
  document.querySelectorAll('#cast-sort-bar .sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCastSort = sort;
  if (sort === 'lastDate') btn.textContent = castSortDir === 'asc' ? '最終指名日 ↑' : '最終指名日';
  renderCasts();
}

function renderCasts() {
  const container = document.getElementById('cast-list');
  const casts = sortCasts(aggregateCasts());
  if (casts.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px 20px;">記録がありません</div>';
    return;
  }
  container.innerHTML = casts.map(function(c) {
    const col = catColor(c.category);
    const castKey = (c.castName||'') + '|' + (c.storeName||'');
    return '<div class="cast-card' + (c.favorite ? ' fav-card' : '') + '" onclick="openCastDetail(\'' + esc(castKey).replace(/'/g,"\\'") + '\')" style="cursor:pointer">'
      + '<div class="cast-card-header">'
      + '<div>'
      + '<span class="cast-name-main">' + (c.castName || '（名前なし）') + '</span>'
      + (c.kissCount ? '<span style="font-size:14px;margin-left:5px" title="キスあり">💋</span>' : '')
      + '<span style="margin-left:8px;font-size:11px;border:1px solid ' + col + ';color:' + col + ';border-radius:8px;padding:1px 7px;">' + c.category + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button class="fav-btn" onclick="toggleCastFav(\'" + castKey.replace(/\'/g,"\\\'") + "\',event)" style="font-size:1rem">' + (c.favorite ? '★' : '☆') + '</button>'
      + '<span class="cast-count-badge">' + c.count + '回</span>'
      + '</div>'
      + '</div>'
      + '<div class="cast-store">🏪 ' + (c.storeName || '（店名なし）') + '</div>'
      + '<div class="cast-stats">'
      + '<div class="cast-stat">最終指名日：<span>' + c.lastDate + '</span>'
      + (function(){
          if (!c.lastDate) return '';
          const diff = Math.floor((Date.now() - new Date(c.lastDate)) / 86400000);
          const col = diff >= 60 ? '#ff4d6d' : diff >= 30 ? '#ffd166' : 'var(--text2)';
          return ' <span style="font-size:11px;color:' + col + '">(' + diff + '日前)</span>';
        })()
      + '</div>'
      + '<div class="cast-stat">指名回数：<span>' + c.count + '回</span></div>'
      + '<div class="cast-stat">総額：<span>' + c.totalAmount.toLocaleString() + '円</span></div>'
      + '</div>'
      + '<div class="cast-ratings">'
      + '<div class="cast-rating-item">容姿 <span>' + c.avgAppearance + '</span></div>'
      + '<div class="cast-rating-item">接客 <span>' + c.avgFriendliness + '</span></div>'
      + '<div class="cast-rating-item">テクニック <span>' + c.avgTechnique + '</span></div>'
      + '<div class="cast-rating-item">雰囲気 <span>' + c.avgAtmosphere + '</span></div>'
      + '<div class="cast-rating-item">トーク <span>' + c.avgTalk + '</span></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ---- export / import ----
function exportData() {
  const payload = {
    app: 'hyoka',
    version: 1,
    exportedAt: new Date().toISOString(),
    entries: load(),
    categories: loadCats()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2)
    + '-' + ('0'+d.getHours()).slice(-2) + ('0'+d.getMinutes()).slice(-2);
  a.href = url;
  a.download = 'hyoka-backup-' + stamp + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function() {
    try {
      const data = JSON.parse(reader.result);
      const entries = Array.isArray(data) ? data : data.entries;
      if (!Array.isArray(entries)) throw new Error('形式が正しくありません');
      if (!confirm('現在のデータを読み込んだ内容で置き換えます。よろしいですか？')) { ev.target.value = ''; return; }
      save(entries);
      if (data.categories && Array.isArray(data.categories) && data.categories.length) {
        saveCats(data.categories);
      }
      currentCat = 'all';
      renderCatTabs();
      if (currentView === 'casts') renderCasts(); else renderList();
      closeSettings();
      alert('読み込みが完了しました（' + entries.length + '件）');
    } catch (err) {
      alert('読み込みに失敗しました：' + err.message);
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

  const nameEl = document.getElementById('new-cat-name');
  const colorEl = document.getElementById('new-cat-color');
  const name = nameEl.value.trim();
  if (!name) { alert('カテゴリー名を入力してください'); return; }
  const cats = loadCats();
  if (cats.some(c => c.name === name)) { alert('同じ名前のカテゴリーが既にあります'); return; }
  cats.push({ name: name, color: colorEl.value || '#00e5ff' });
  saveCats(cats);
  nameEl.value = '';
  renderCatManager();
  renderCatTabs();
}

function deleteCategory(name) {
  const used = load().filter(e => e.category === name).length;
  let msg = 'カテゴリー「' + name + '」を削除しますか？';
  if (used > 0) msg += '\n（このカテゴリーの記録 ' + used + ' 件はそのまま残ります）';
  if (!confirm(msg)) return;
  saveCats(loadCats().filter(c => c.name !== name));
  if (currentCat === name) currentCat = 'all';
  renderCatManager();
  renderCatTabs();
  if (currentView === 'casts') renderCasts(); else renderList();
}

// ===== STORE VIEW =====
let currentStoreSort = 'lastDate';

function aggregateStores() {
  const entries = load();
  const map = {};
  entries.forEach(function(e) {
    if (currentCat !== 'all' && e.category !== currentCat) return;
    const key = (e.storeName || '（店名なし）') + '|' + e.category;
    if (!map[key]) {
      map[key] = {
        storeName: e.storeName || '（店名なし）',
        category: e.category,
        count: 0, lastDate: '', totalAmount: 0
      };
    }
    const s = map[key];
    s.count++;
    if (!s.lastDate || e.date > s.lastDate) s.lastDate = e.date;
    s.totalAmount += (e.amount || 0);
  });
  return Object.values(map).map(function(s) {
    return Object.assign(s, {
      avgAmount: Math.round(s.totalAmount / s.count)
    });
  });
}

function sortStores(stores) {
  return stores.sort(function(a, b) {
    switch (currentStoreSort) {
      case 'lastDate':    return b.lastDate.localeCompare(a.lastDate);
      case 'count':       return b.count - a.count;
      case 'amount':      return b.totalAmount - a.totalAmount;
      case 'appearance':  return b.avgAppearance - a.avgAppearance;
      case 'friendliness':return b.avgFriendliness - a.avgFriendliness;
      case 'technique':   return b.avgTechnique - a.avgTechnique;
      case 'atmosphere':  return b.avgAtmosphere - a.avgAtmosphere;
      case 'totalAmount': return b.totalAmount - a.totalAmount;
      default: return 0;
    }
  });
}

function setStoreSort(btn, sort) {
  document.querySelectorAll('#store-sort-bar .sort-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentStoreSort = sort;
  renderStores();
}

function renderStores() {
  const container = document.getElementById('store-list');
  const stores = sortStores(aggregateStores());
  if (!stores.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px 20px;">記録がありません</div>';
    return;
  }
  container.innerHTML = stores.map(function(s) {
    const col = catColor(s.category);
    return '<div class="store-card">'
      + '<div class="store-card-header">'
      + '<div>'
      + '<span class="store-name-main">' + esc(s.storeName) + '</span>'
      + '<span style="margin-left:8px;font-size:11px;border:1px solid ' + col + ';color:' + col + ';border-radius:8px;padding:1px 7px;">' + esc(s.category) + '</span>'
      + '</div>'
      + '<span class="store-visit-badge">' + s.count + '回</span>'
      + '</div>'
      + '<div class="store-stats">'
      + '<div>最終訪問日：<span>' + s.lastDate + '</span></div>'
      + '<div>合計金額：<span style="color:var(--gold)">¥' + s.totalAmount.toLocaleString() + '</span></div>'
      + '<div>平均金額：<span>¥' + s.avgAmount.toLocaleString() + '</span></div>'
      + '<div>訪問回数：<span>' + s.count + '回</span></div>'
      + '</div>'
      + (function() {
          const memo = getStoreMemo(s.storeName);
          if (memo) {
            return '<div class="store-memo-row" onclick="editStoreMemo(\'' + esc(s.storeName).replace(/'/g,"\\'") + '\')" title="メモを編集">'
              + '<span class="store-memo-text">📝 ' + esc(memo) + '</span>'
              + '</div>';
          }
          return '<div class="store-memo-add" onclick="editStoreMemo(\'' + esc(s.storeName).replace(/'/g,"\\'") + '\')">＋ 店舗メモを追加</div>';
        })()
      + (LOC_CATS.includes(s.category) ? (function() {
          const loc = getStoreLoc(s.storeName);
          if (loc) {
            return '<div class="store-loc-row">'
              + '<a href="https://maps.google.com/?q=' + loc.lat + ',' + loc.lng + '" target="_blank" class="store-loc-link">📍 ' + loc.lat.toFixed(5) + ', ' + loc.lng.toFixed(5) + '</a>'
              + '<button class="store-loc-del" onclick="deleteStoreLoc(\'' + esc(s.storeName).replace(/'/g, "\\'") + '\',event)">✕</button>'
              + '</div>';
          }
          return '<div class="store-loc-none">'
            + '<button onclick="registerStoreLoc(\'" + esc(s.storeName).replace(/\'/g,"\\\'") + "\',event)"'
            + ' style="background:transparent;border:1px solid var(--neon-cyan);color:var(--neon-cyan);border-radius:8px;padding:4px 12px;font-size:.76rem;cursor:pointer">'
            + '📍 場所を登録</button>'
            + '</div>';
        })() : '')
      + '</div>';
  }).join('');
}


function registerStoreLoc(name, ev) {
  if (ev) ev.stopPropagation();
  if (!navigator.geolocation) { alert('位置情報が使用できません'); return; }
  navigator.geolocation.getCurrentPosition(function(p) {
    setStoreLoc(name, p.coords.latitude, p.coords.longitude);
    renderStores();
  }, function() {
    alert('位置情報の取得に失敗しました');
  });
}

function editStoreMemo(name) {
  const current = getStoreMemo(name);
  const text = prompt('「' + name + '」のメモ（予約方法・駐車場・注意点など）', current);
  if (text === null) return;
  setStoreMemo(name, text.trim());
  renderStores();
}

function deleteStoreLoc(name, ev) {
  ev.stopPropagation();
  if (!confirm('「' + name + '」の保存済み場所を削除しますか？')) return;
  const m = loadStoreLocs();
  delete m[name];
  saveStoreLocs(m);
  renderStores();
}

// ===== STATS VIEW =====
function renderStats() {
  const entries = load().filter(function(e) {
    return currentCat === 'all' || e.category === currentCat;
  });
  const el = document.getElementById('stats-view');
  if (!entries.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px">記録がありません</div>';
    return;
  }

  const totalVisits  = entries.length;
  const totalAmount  = entries.reduce(function(s, e) { return s + (e.amount||0); }, 0);
  const avgAmount    = Math.round(totalAmount / totalVisits);
  const favCount     = entries.filter(function(e) { return e.favorite; }).length;

  // monthly data (last 6 months)
  const monthMap = {};
  entries.forEach(function(e) {
    const m = (e.date || '').slice(0,7);
    if (!m) return;
    if (!monthMap[m]) monthMap[m] = { count:0, amount:0 };
    monthMap[m].count++;
    monthMap[m].amount += (e.amount||0);
  });
  const months = Object.keys(monthMap).sort().slice(-6);
  const maxAmt = Math.max.apply(null, months.map(function(m) { return monthMap[m].amount; })) || 1;

  // category breakdown
  const catMap = {};
  entries.forEach(function(e) {
    if (!catMap[e.category]) catMap[e.category] = { count:0, amount:0 };
    catMap[e.category].count++;
    catMap[e.category].amount += (e.amount||0);
  });
  const catRows = Object.keys(catMap).sort(function(a,b) { return catMap[b].count - catMap[a].count; });

  const monthBars = months.map(function(m) {
    const d = monthMap[m];
    const pct = Math.round(d.amount / maxAmt * 100);
    const label = m.slice(0,4) + '/' + m.slice(5,7);
    return '<div class="month-bar-row">'
      + '<span class="month-bar-label">' + label + '</span>'
      + '<div class="month-bar-wrap"><div class="month-bar-fill" style="width:' + pct + '%"></div></div>'
      + '<span class="month-bar-val">¥' + (d.amount/1000).toFixed(1) + 'k</span>'
      + '</div>';
  }).join('');

  const catRowsHtml = catRows.map(function(name) {
    const col = catColor(name);
    const d = catMap[name];
    return '<div class="cat-stat-row">'
      + '<span class="cat-stat-dot" style="background:' + col + ';box-shadow:0 0 6px ' + col + '"></span>'
      + '<span class="cat-stat-name">' + esc(name) + '</span>'
      + '<span class="cat-stat-count">' + d.count + '件</span>'
      + '<span class="cat-stat-amount">¥' + d.amount.toLocaleString() + '</span>'
      + '</div>';
  }).join('');

  el.innerHTML = ''
    + '<div class="stats-total-grid">'
    + '<div class="stats-total-card"><div class="stats-total-label">総訪問数</div><div class="stats-total-value">' + totalVisits + '<span style="font-size:.8rem;color:var(--text2)"> 回</span></div></div>'
    + '<div class="stats-total-card"><div class="stats-total-label">⭐ お気に入り</div><div class="stats-total-value">' + favCount + '<span style="font-size:.8rem;color:var(--text2)"> 件</span></div></div>'
    + '<div class="stats-total-card"><div class="stats-total-label">合計金額</div><div class="stats-total-value gold">¥' + totalAmount.toLocaleString() + '</div></div>'
    + '<div class="stats-total-card"><div class="stats-total-label">平均単価</div><div class="stats-total-value gold">¥' + avgAmount.toLocaleString() + '</div></div>'
    + '</div>'
    + '<div class="stats-section"><div class="stats-title">月別金額（直近6ヶ月）</div>' + (monthBars || '<div style="color:var(--text2);font-size:.82rem">データなし</div>') + '</div>'
    + '<div class="stats-section"><div class="stats-title">カテゴリー内訳</div>' + catRowsHtml + '</div>';
}


// ===== STORE AUTOCOMPLETE =====
function getStoreNames() {
  const names = [];
  load().forEach(function(e) {
    if (e.storeName && !names.includes(e.storeName)) names.push(e.storeName);
  });
  return names.sort();
}

function getCastNames() {
  var names = [];
  load().forEach(function(e) {
    if (e.castName && !names.includes(e.castName)) names.push(e.castName);
  });
  return names.sort();
}

function checkNewCast() {
  var castName = (document.getElementById('f-cast') || {}).value || '';
  var storeName = (document.getElementById('f-store') || {}).value || '';
  castName = castName.trim();
  var castKey = castName + '|' + storeName.trim();
  var isNew = castName.length > 0 && !loadCastRatings()[castKey];
  var section = document.getElementById('new-cast-ratings');
  if (section) section.style.display = isNew ? '' : 'none';
  var kissGroup = document.getElementById('kiss-form-group');
  if (kissGroup) {
    var alreadyKissed = castName.length > 0 && load().some(function(e) {
      return e.castName === castName && e.storeName === (document.getElementById('f-store') || {}).value.trim() && e.kiss;
    });
    kissGroup.style.display = alreadyKissed ? 'none' : '';
  }
}

function acOpen(field) {
  acFilter(field);
}

function acFilter(field) {
  const input = document.getElementById('f-' + field);
  const list  = document.getElementById('ac-' + field + '-list');
  if (!input || !list) return;

  const q = input.value.trim().toLowerCase();
  const all = field === 'store' ? getStoreNames() : field === 'cast' ? getCastNames() : [];
  const filtered = q ? all.filter(function(n) { return toHira(n.toLowerCase()).includes(toHira(q)); }) : all;

  if (!filtered.length) {
    list.classList.remove('open');
    return;
  }

  list.innerHTML = filtered.map(function(n) {
    return '<div class="ac-item" onmousedown="acPick(\'' + field + '\',\'' + esc(n).replace(/'/g, "\\'") + '\')">' + esc(n) + '</div>';
  }).join('');
  list.classList.add('open');
}

function acPick(field, value) {
  const input = document.getElementById('f-' + field);
  if (input) input.value = value;
  acClose(field);
  if (field === 'store') { applyStoreLoc(value); checkNewCast(); }
  if (field === 'cast') checkNewCast();
}

function acClose(field) {
  const list = document.getElementById('ac-' + field + '-list');
  if (list) list.classList.remove('open');
}

function acBlur(field) {
  // delay so onmousedown on ac-item fires first
  setTimeout(function() { acClose(field); }, 180);
}



// ===== CAST DETAIL MODAL =====
var currentCastKey = '';
function openCastDetail(castKey) {
  currentCastKey = castKey;
  const parts = castKey.split('|');
  const castName = parts[0] || '（名前なし）';
  const storeName = parts[1] || '';
  document.getElementById('episode-modal-title').textContent = castName + (storeName ? '  @' + storeName : '');

  const allCasts = aggregateCasts();
  const c = allCasts.find(function(x) {
    return (x.castName||'') === parts[0] && (x.storeName||'') === parts[1];
  });

  const entries = load().filter(function(e) {
    return (e.castName||'') === parts[0] && (e.storeName||'') === parts[1];
  }).sort(function(a,b) { return b.date.localeCompare(a.date); });

  const el = document.getElementById('episode-list');
  var html = '';

  // キャスト評価（summaryより先に取得）
  var castKey2 = parts[0] + '|' + parts[1];
  var cr = getCastRating(castKey2);

  if (c) {
    var diff = c.lastDate ? Math.floor((Date.now() - new Date(c.lastDate)) / 86400000) : null;
    var diffCol = diff >= 60 ? '#ff4d6d' : diff >= 30 ? '#ffd166' : 'var(--text2)';
    html += '<div style="padding:12px 0 16px;border-bottom:2px solid var(--border)">';
    html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px">';
    html += '<span style="font-size:.85rem;color:var(--text2)">指名回数：<b style="color:var(--text)">' + c.count + '回</b></span>';
    html += '<span style="font-size:.85rem;color:var(--text2)">総額：<b style="color:var(--gold)">¥' + c.totalAmount.toLocaleString() + '</b></span>';

    html += '</div>';
    if (c.lastDate) {
      html += '<div style="font-size:.82rem;color:var(--text2);margin-bottom:6px">最終指名：<span style="color:var(--text)">' + c.lastDate + '</span>';
      if (diff !== null) html += ' <span style="font-size:11px;color:' + diffCol + '">(' + diff + '日前)</span>';
      html += '</div>';
    }
    var castMemo = cr.memo || '';
    if (castMemo) {
      html += '<div style="font-size:.82rem;color:var(--text);opacity:.85;margin-bottom:4px">' + esc(castMemo) + '</div>';
    }
    html += '</div>';
  }

  // 評価スライダーセクション
  var rKeys = ['appearance','friendliness','technique','atmosphere','talk'];
  var rLabels = ['容姿','接客','テクニック','雰囲気','トーク'];
  html += '<div style="padding:14px 0 16px;border-bottom:2px solid var(--border)">';
  html += '<div onclick="toggleCastRating()" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text2);margin-bottom:0;letter-spacing:.05em">';
  html += '評価 <span id="cast-rating-chevron" style="font-size:.75rem">▶</span></div>';
  html += '<div id="cast-rating-body" style="display:none">';
  for (var ri = 0; ri < rKeys.length; ri++) {
    var rk = rKeys[ri];
    var rv = cr[rk] !== undefined ? cr[rk] : 50;
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<span style="font-size:.8rem;color:var(--text2);width:52px;flex-shrink:0">' + rLabels[ri] + '</span>';
    html += '<input type="range" min="0" max="100" value="' + rv + '" id="cr-' + rk + '-' + castKey2.replace(/[^a-zA-Z0-9]/g,'_') + '"';
    html += ' oninput="this.nextElementSibling.textContent=this.value;refreshSliderBg(this)"';
    html += ' style="flex:1">';
    html += '<span style="font-size:.82rem;color:var(--accent2);font-weight:700;width:26px;text-align:right">' + rv + '</span>';
    html += '</div>';
  }
  html += '<div style="margin-top:10px;margin-bottom:8px">';
  html += '<div style="font-size:.78rem;color:var(--text2);margin-bottom:4px">一言メモ</div>';
  html += '<textarea id="cr-memo-' + castKey2.replace(/[^a-zA-Z0-9]/g,'_') + '"';
  html += ' style="width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:.82rem;resize:none;box-sizing:border-box"';
  html += ' rows="2" placeholder="このキャストについての一言メモ">' + esc(cr.memo || '') + '</textarea>';
  html += '</div>';
  html += '<button onclick="saveCastRatingFromModal(this)" style="margin-top:4px;padding:6px 18px;font-size:.82rem;background:var(--neon-cyan);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">保存</button>';
  html += '</div>';
  html += '</div>';

  if (!entries.length) {
    html += '<div style="text-align:center;color:var(--text2);padding:32px 16px">来店記録がありません</div>';
  } else {
    html += entries.map(function(e) {
      var row = '<div style="padding:12px 0;border-bottom:1px solid var(--border)">';
      row += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">';
      row += '<span style="font-size:.78rem;color:var(--text2)">' + esc(e.date) + '</span>';
      row += '<span style="font-size:.88rem;color:var(--gold)">¥' + Number(e.amount||0).toLocaleString() + '</span>';
      row += '</div>';
      if (e.course || e.kiss) {
        row += '<div style="font-size:.78rem;color:var(--text2);margin-bottom:4px">';
        if (e.course) row += esc(e.course);
        if (e.course && e.kiss) row += '　';
        if (e.kiss) row += '💋';
        row += '</div>';
      }
      if (e.memo) {
        row += '<div style="font-size:.82rem;color:var(--text);margin-bottom:4px;opacity:.85">' + esc(e.memo) + '</div>';
      }
      if (e.episode) {
        row += '<div style="font-size:.82rem;color:var(--neon-pink);white-space:pre-wrap;word-break:break-word;line-height:1.5;border-left:2px solid var(--neon-pink);padding-left:8px;margin-top:4px">' + esc(e.episode) + '</div>';
      }
      row += '</div>';
      return row;
    }).join('');
  }

  el.innerHTML = html;
  document.getElementById('episode-modal').classList.add('open');
}
function closeEpisode() { document.getElementById('episode-modal').classList.remove('open'); }
function bgCloseEpisode(e) { if (e.target.id === 'episode-modal') closeEpisode(); }
function toggleCastRating() {
  var body = document.getElementById('cast-rating-body');
  var icon = document.getElementById('cast-rating-chevron');
  if (!body) return;
  var open = body.style.display === 'none';
  body.style.display = open ? '' : 'none';
  icon.textContent = open ? '▼' : '▶';
}

function saveCastRatingFromModal(btn) {
  var safeId = currentCastKey.replace(/[^a-zA-Z0-9]/g,'_');
  var rKeys = ['appearance','friendliness','technique','atmosphere','talk'];
  var ratings = {};
  rKeys.forEach(function(k) {
    var el = document.getElementById('cr-' + k + '-' + safeId);
    ratings[k] = el ? parseInt(el.value) : 50;
  });
  var memoEl = document.getElementById('cr-memo-' + safeId);
  if (memoEl) ratings.memo = memoEl.value.trim();
  setCastRating(currentCastKey, ratings);
  renderCasts();
  if (btn) { btn.textContent = '保存済み'; setTimeout(function() { btn.textContent = '保存'; }, 1200); }
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

document.querySelectorAll('input[type="range"]').forEach(sl => {
  refreshSliderBg(sl);
  sl.addEventListener('input', () => refreshSliderBg(sl));
});
