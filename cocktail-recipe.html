      },
      {
        id:'c17', name:'ブルーハワイ', category:'カクテル', glass:'タンブラー',
        ingredients:[{name:'ウォッカ',ml:30,ratio:1},{name:'ブルーキュラソー',ml:15,ratio:0.5},{name:'パイナップルジュース',ml:60,ratio:2},{name:'ソーダ',ml:45,ratio:1.5},{name:'氷',ml:0,ratio:0}],
        steps:['グラスに氷を入れる。','ウォッカとブルーキュラソーを注ぐ。','パイナップルジュースを加える。','ソーダを静かに注ぎ、軽くステアする。'],
        notes:'鮮やかなブルーが映え抜群！南国気分のトロピカルカクテル。',
      },
      {
        id:'c18', name:'コスモポリタン', category:'カクテル', glass:'カクテルグラス',
        ingredients:[{name:'ウォッカ',ml:45,ratio:1},{name:'コアントロー',ml:15,ratio:0.3},{name:'クランベリージュース',ml:30,ratio:0.7},{name:'ライムジュース',ml:10,ratio:0.2}],
        steps:['シェーカーに氷と全材料を入れる。','しっかりシェイクする。','カクテルグラスに注ぐ。','お好みでライムを飾る。'],
        notes:'「セックス・アンド・ザ・シティ」で有名なピンクのおしゃれカクテル！',
      },
      {
        id:'c19', name:'シャンディーガフ', category:'スパークリング', glass:'ジョッキ',
        ingredients:[{name:'ビール',ml:150,ratio:1},{name:'ジンジャーエール',ml:150,ratio:1}],
        steps:['グラスを冷やしておく。','冷えたビールを半分注ぐ。','ジンジャーエールをゆっくり注ぐ。','かき混ぜずにそのまま提供。'],
        notes:'アルコール度数が下がるので飲みやすい。炭酸が弱まるので作ったらすぐ提供して。',
      },
      {
        id:'c20', name:'レッドアイ', category:'カクテル', glass:'ジョッキ',
        ingredients:[{name:'ビール',ml:150,ratio:1},{name:'トマトジュース',ml:150,ratio:1}],
        steps:['グラスにトマトジュースを注ぐ。','冷えたビールをゆっくり注ぐ。','かき混ぜずにそのまま提供。'],
        notes:'二日酔いに効くとも言われる不思議な組み合わせ。意外とさっぱり飲める！',
      },
    ];

    function parseCSVLine(line) {
      const result = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
        else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else { cur += c; }
      }
      result.push(cur); return result;
    }

    function App() {
      const [tab, setTab] = useState('search');
      const [recipes, setRecipes] = useState(() => { try { const s = localStorage.getItem('recipe_v1'); return s ? JSON.parse(s) : SAMPLE; } catch { return SAMPLE; } });
      const [q, setQ] = useState('');
      const [cat, setCat] = useState('すべて');
      const [detail, setDetail] = useState(null);
      const [toast, setToast] = useState(null);
      useEffect(() => { try { localStorage.setItem('recipe_v1', JSON.stringify(recipes)); } catch {} }, [recipes]);
      const showToast = (msg) => { setToast(null); setTimeout(() => { setToast(msg); setTimeout(() => setToast(null), 2600); }, 10); };
      const filtered = useMemo(() => recipes.filter(r => {
        if (cat !== 'すべて' && r.category !== cat) return false;
        if (!q) return true;
        const lq = q.toLowerCase();
        return r.name.toLowerCase().includes(lq) || r.category.toLowerCase().includes(lq) || r.ingredients.some(i => i.name.toLowerCase().includes(lq)) || r.steps.some(s => s.toLowerCase().includes(lq));
      }), [recipes, q, cat]);
      const addRecipe = (r) => { setRecipes(p => [{ ...r, id: Date.now().toString() }, ...p]); showToast('✨ レシピを登録しました！'); setTab('search'); };
      const deleteRecipe = (id) => { setRecipes(p => p.filter(r => r.id !== id)); setDetail(null); showToast('🗑️ レシピを削除しました'); };
      return (
        <>
          <div className="header"><div className="header-title">✿ カクテルレシピ帳 ✿</div><div className="header-sub">concept café recipe book</div></div>
          <div className="tab-bar">
            {[{id:'search',icon:'🔍',label:'検索'},{id:'list',icon:'📖',label:'メニュー'},{id:'add',icon:'✏️',label:'レシピ追加'},{id:'data',icon:'💾',label:'データ'}].map(t => (
              <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}><span className="tab-icon">{t.icon}</span>{t.label}</button>
            ))}
          </div>
          <div className="main">
            {tab==='search' && <SearchTab recipes={filtered} q={q} setQ={setQ} cat={cat} setCat={setCat} onSelect={setDetail} />}
            {tab==='list' && <ListTab recipes={recipes} onSelect={setDetail} />}
            {tab==='add' && <AddTab onAdd={addRecipe} />}
            {tab==='data' && <DataTab recipes={recipes} setRecipes={setRecipes} showToast={showToast} />}
          </div>
          {detail && <DetailModal recipe={detail} onClose={() => setDetail(null)} onDelete={deleteRecipe} />}
          {toast && <div className="toast">{toast}</div>}
        </>
      );
    }

    function SearchTab({ recipes, q, setQ, cat, setCat, onSelect }) {
      return (
        <>
          <div className="search-wrap"><span className="search-icon">🔍</span><input className="search-input" placeholder="ドリンク名・材料・手順で検索..." value={q} onChange={e => setQ(e.target.value)} /></div>
          <div className="filter-scroll">{CATEGORIES.map(c => (<button key={c} className={`chip ${cat===c?'active':''}`} onClick={() => setCat(c)}>{c!=='すべて'&&CAT_ICON[c]} {c}</button>))}</div>
          {recipes.length===0 ? <div className="empty"><div className="empty-icon">🔍</div><div className="empty-text">レシピが見つかりませんでした<br/>キーワードを変えてみてね</div></div> : <RecipeGrid recipes={recipes} onSelect={onSelect} />}
        </>
      );
    }

    function ListTab({ recipes, onSelect }) {
      return (<><div className="count-note">📋 登録レシピ: {recipes.length}件</div>{recipes.length===0?<div className="empty"><div className="empty-icon">📖</div><div className="empty-text">レシピがまだありません<br/>「レシピ追加」から登録してね</div></div>:<RecipeGrid recipes={recipes} onSelect={onSelect} />}</>);
    }

    function RecipeGrid({ recipes, onSelect }) {
      return (<div className="recipe-grid">{recipes.map(r => (<div key={r.id} className="recipe-card" onClick={() => onSelect(r)}><div className="recipe-emoji">{CAT_ICON[r.category]||'🍹'}</div><div className="recipe-name">{r.name}</div><div className="recipe-badge">{r.category}</div><div className="recipe-ing-preview">{r.ingredients.filter(i=>i.name).slice(0,3).map(i=>i.name).join(' · ')}{r.ingredients.filter(i=>i.name).length>3?' ...':''}</div></div>))}</div>);
    }

    function DetailModal({ recipe, onClose, onDelete }) {
      const validIng = recipe.ingredients.filter(i => i.name);
      const totalMl = validIng.reduce((s,i) => s+(Number(i.ml)||0), 0);
      return (
        <div className="overlay" onClick={e => e.target===e.currentTarget&&onClose()}>
          <div className="sheet">
            <div className="sheet-handle" />
            <div className="sheet-hero"><div className="hero-emoji">{CAT_ICON[recipe.category]||'🍹'}</div><div className="hero-name">{recipe.name}</div><div className="hero-tags"><span className="hero-tag">{recipe.category}</span>{recipe.glass&&<span className="hero-tag-glass">🥃 {recipe.glass}</span>}</div></div>
            <div className="sec-title">🌸 材料</div>
            {totalMl>0&&<div className="total-bar">合計<span className="total-val">約{totalMl}ml</span></div>}
            <table className="ing-table"><thead><tr><th>材料</th><th>ml</th><th>割合</th></tr></thead><tbody>{validIng.map((ing,i) => (<tr key={i}><td>{ing.name}</td><td>{ing.ml>0?<span className="ml-pill">{ing.ml}ml</span>:<span style={{color:'#d4a0b5'}}>—</span>}</td><td>{ing.ratio>0?<span className="ratio-text">{ing.ratio}</span>:<span style={{color:'#d4a0b5'}}>—</span>}</td></tr>))}</tbody></table>
            <div className="sec-title">✨ 作り方</div>
            {recipe.steps.filter(s=>s).map((step,i) => (<div key={i} className="step-item"><div className="step-num">{i+1}</div><div className="step-text">{step}</div></div>))}
            {recipe.notes&&(<><div className="sec-title">💌 メモ</div><div className="notes-box">{recipe.notes}</div></>)}
            <div className="modal-actions"><button className="btn-close" onClick={onClose}>閉じる</button><button className="btn-delete" onClick={() => window.confirm('このレシピを削除しますか？')&&onDelete(recipe.id)}>🗑️ 削除</button></div>
          </div>
        </div>
      );
    }

    function DataTab({ recipes, setRecipes, showToast }) {
      const fileRef = useRef(null);
      const [importMode, setImportMode] = useState('add');
      const today = () => new Date().toISOString().slice(0,10);
      const dl = (blob, name) => { const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url); };
      const exportJSON = () => { dl(new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'}),`レシピ帳_${today()}.json`); showToast('📤 JSONで書き出しました'); };
      const exportCSV = () => {
        const h = 'ドリンク名,カテゴリ,グラス,材料（名前:ml:割合 を/区切り）,手順（|区切り）,メモ';
        const rows = recipes.map(r => { const ings=r.ingredients.filter(i=>i.name).map(i=>`${i.name}:${i.ml}:${i.ratio}`).join('/'); const steps=r.steps.filter(s=>s).join('|'); return [r.name,r.category,r.glass||'',ings,steps,r.notes||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','); });
        dl(new Blob(['﻿'+[h,...rows].join('\n')],{type:'text/csv;charset=utf-8'}),`レシピ帳_${today()}.csv`); showToast('📤 CSVで書き出しました');
      };
      const dlTemplate = () => {
        const h = 'ドリンク名,カテゴリ,グラス,材料（名前:ml:割合 を/区切り）,手順（|区切り）,メモ';
        const ex = '"サンプルドリンク","カクテル","グラス","ソーダ:100:2/レモン:30:0.6","グラスに氷を入れる|ソーダを注ぐ","メモ欄"';
        dl(new Blob(['﻿'+[h,ex].join('\n')],{type:'text/csv;charset=utf-8'}),'レシピ帳テンプレート.csv'); showToast('📋 テンプレートをダウンロードしました');
      };
      const handleFile = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            let imported = [];
            if (file.name.toLowerCase().endsWith('.json')) {
              const data = JSON.parse(ev.target.result);
              if (!Array.isArray(data)) throw new Error('配列形式のJSONが必要です');
              imported = data.map(r => ({id:Date.now().toString()+Math.random(),name:r.name||'',category:r.category||'その他',glass:r.glass||'',ingredients:Array.isArray(r.ingredients)?r.ingredients:[],steps:Array.isArray(r.steps)?r.steps:[],notes:r.notes||''}));
            } else {
              const text = ev.target.result.replace(/^﻿/,'');
              imported = text.split(/\r?\n/).slice(1).filter(l=>l.trim()).map(line => {
                const cols = parseCSVLine(line);
                const [name,category,glass,ingsStr,stepsStr,notes] = cols;
                return {id:Date.now().toString()+Math.random(),name:(name||'').trim(),category:(category||'その他').trim(),glass:(glass||'').trim(),ingredients:(ingsStr||'').split('/').filter(Boolean).map(s=>{const p=s.split(':');return{name:p[0]||'',ml:Number(p[1])||0,ratio:Number(p[2])||0};}),steps:(stepsStr||'').split('|').filter(Boolean),notes:(notes||'').trim()};
              }).filter(r=>r.name);
            }
            if (imported.length===0) { alert('読み込めるレシピがありませんでした'); return; }
            if (importMode==='replace') { if(!window.confirm(`現在の${recipes.length}件を削除して${imported.length}件に置き換えますか？`)) return; setRecipes(imported); }
            else { setRecipes(p=>[...imported,...p]); }
            showToast(`✨ ${imported.length}件を読み込みました！`);
          } catch(err) { alert('読み込みに失敗しました。\n'+err.message); }
          e.target.value='';
        };
        reader.readAsText(file,'UTF-8');
      };
      return (
        <>
          <div className="data-card">
            <div className="data-card-title">📤 書き出し（バックアップ）</div>
            <div className="data-btn-row"><button className="data-btn" onClick={exportJSON}>⬇ JSON</button><button className="data-btn" onClick={exportCSV}>⬇ CSV</button></div>
            <div style={{fontSize:11,color:'#c090a8',marginTop:8,lineHeight:1.7}}>JSON: 完全バックアップ用 / CSV: スプレッドシートで編集可能</div>
          </div>
          <div className="data-card">
            <div className="data-card-title">📥 読み込み</div>
            <div className="import-mode"><label><input type="radio" value="add" checked={importMode==='add'} onChange={() => setImportMode('add')} />追加（既存を残す）</label><label><input type="radio" value="replace" checked={importMode==='replace'} onChange={() => setImportMode('replace')} />置き換え</label></div>
            <button className="data-btn-wide" onClick={() => fileRef.current.click()}>📂 ファイルを選ぶ（JSON / CSV）</button>
            <input ref={fileRef} type="file" accept=".json,.csv" style={{display:'none'}} onChange={handleFile} />
          </div>
          <div className="data-card">
            <div className="data-card-title">📋 別メモからの取り込み方</div>
            <div style={{fontSize:12,color:'#8b4060',lineHeight:1.8,marginBottom:10}}>スプレッドシートでメモしている場合は、テンプレートをダウンロードして形式に合わせて入力後、CSVで保存して読み込んでください。</div>
            <div className="csv-hint">CSV列の形式：<code>ドリンク名, カテゴリ, グラス, 材料（名前:ml:割合 を / で区切る）, 手順（| で区切る）, メモ</code></div>
            <button className="data-btn-wide" style={{marginTop:10}} onClick={dlTemplate}>📄 テンプレートCSVをダウンロード</button>
          </div>
          <div style={{fontSize:12,color:'#b07090',textAlign:'center',marginTop:4}}>現在 {recipes.length}件のレシピが保存されています</div>
        </>
      );
    }

    function AddTab({ onAdd }) {
      const blank = {name:'',ml:'',ratio:''};
      const [name,setName]=useState(''); const [category,setCategory]=useState('カクテル'); const [glass,setGlass]=useState('');
      const [ings,setIngs]=useState([{...blank},{...blank}]); const [steps,setSteps]=useState(['','']); const [notes,setNotes]=useState('');
      const updIng=(i,f,v)=>setIngs(p=>p.map((x,j)=>j===i?{...x,[f]:v}:x)); const delIng=(i)=>setIngs(p=>p.filter((_,j)=>j!==i));
      const updStep=(i,v)=>setSteps(p=>p.map((x,j)=>j===i?v:x)); const delStep=(i)=>setSteps(p=>p.filter((_,j)=>j!==i));
      const reset=()=>{setName('');setCategory('カクテル');setGlass('');setIngs([{...blank},{...blank}]);setSteps(['','']);setNotes('');};
      const submit=()=>{ if(!name.trim()){alert('ドリンク名を入力してね！');return;} const vi=ings.filter(i=>i.name.trim()); if(vi.length===0){alert('材料を1つ以上入力してね！');return;} onAdd({name:name.trim(),category,glass:glass.trim(),ingredients:vi.map(i=>({name:i.name.trim(),ml:Number(i.ml)||0,ratio:Number(i.ratio)||0})),steps:steps.filter(s=>s.trim()),notes:notes.trim()}); reset(); };
      return (
        <>
          <div className="form-title">✨ 新しいレシピを登録</div>
          <div className="form-sec"><label className="form-label">🍹 ドリンク名 *</label><input className="f-input" placeholder="例: ストロベリーソーダ" value={name} onChange={e=>setName(e.target.value)} /></div>
          <div className="form-sec"><label className="form-label">🏷️ カテゴリ</label><select className="f-input f-select" value={category} onChange={e=>setCategory(e.target.value)}>{CATEGORIES.filter(c=>c!=='すべて').map(c=>(<option key={c} value={c}>{CAT_ICON[c]} {c}</option>))}</select></div>
          <div className="form-sec"><label className="form-label">🥃 グラスの種類</label><input className="f-input" placeholder="例: タンブラー、マグカップ" value={glass} onChange={e=>setGlass(e.target.value)} /></div>
          <div className="form-sec">
            <label className="form-label">🌸 材料</label>
            <div className="col-header"><div className="col-h">材料名</div><div className="col-h-c">ml</div><div className="col-h-c">割合</div><div /></div>
            {ings.map((ing,i)=>(<div key={i} className="ing-row"><input className="f-input" placeholder="材料名" value={ing.name} onChange={e=>updIng(i,'name',e.target.value)} /><input className="f-input" type="number" placeholder="ml" value={ing.ml} onChange={e=>updIng(i,'ml',e.target.value)} /><input className="f-input" type="number" step="0.1" placeholder="1" value={ing.ratio} onChange={e=>updIng(i,'ratio',e.target.value)} /><button className="del-btn" onClick={()=>delIng(i)}>×</button></div>))}
            <button className="add-row-btn" onClick={()=>setIngs(p=>[...p,{...blank}])}>＋ 材料を追加</button>
          </div>
          <div className="form-sec">
            <label className="form-label">✨ 作り方（手順）</label>
            {steps.map((step,i)=>(<div key={i} className="step-row"><div className="step-num-sm">{i+1}</div><textarea className="f-input f-textarea" style={{height:60}} placeholder={`手順 ${i+1}`} value={step} onChange={e=>updStep(i,e.target.value)} /><button className="del-btn" style={{marginTop:8}} onClick={()=>delStep(i)}>×</button></div>))}
            <button className="add-row-btn" onClick={()=>setSteps(p=>[...p,''])}>＋ 手順を追加</button>
          </div>
          <div className="form-sec"><label className="form-label">💌 メモ（任意）</label><textarea className="f-input f-textarea" style={{height:80}} placeholder="アレルギー情報・味のポイント・アレンジ方法など" value={notes} onChange={e=>setNotes(e.target.value)} /></div>
          <button className="submit-btn" onClick={submit}>✿ レシピを登録する ✿</button>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
